<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Строим 🏡"/>
<meta name="theme-color" content="#0D0F14"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<title>Строим Дом</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Mulish:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0F14;--bg2:#13161C;--bg3:#1A1E27;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#EAE6DE;--text2:rgba(234,230,222,0.55);--text3:rgba(234,230,222,0.28);
  --gold:#C9AA7C;--blue:#7BB8CC;--green:#80C89A;--red:#CC7B7B;
  --safe:env(safe-area-inset-bottom,0px);--top:env(safe-area-inset-top,0px);
  --drawer:280px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;overflow:hidden}
#app{position:fixed;inset:0;overflow:hidden}

/* DRAWER */
#drawerBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:90;pointer-events:none;transition:background .3s ease}
#drawerBackdrop.open{background:rgba(0,0,0,.6);pointer-events:all}
#drawer{position:fixed;top:0;left:0;bottom:0;width:var(--drawer);background:#0f1118;border-right:1px solid var(--border2);z-index:100;transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#drawer.open{transform:translateX(0)}
.drawer-header{padding:calc(var(--top) + 20px) 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:2px}
.drawer-sub{font-size:11px;color:var(--text3)}
.drawer-scroll{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch}
.drawer-scroll::-webkit-scrollbar{display:none}
.drawer-section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:4px 10px 8px}
.obj-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.obj-item.active{background:rgba(201,170,124,.12);border:1px solid rgba(201,170,124,.2)}
.obj-item:not(.active){border:1px solid transparent}
.obj-icon{font-size:20px;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:9px}
.obj-info{flex:1;min-width:0}
.obj-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.obj-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.obj-active-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0}
.drawer-add-btn{margin:8px 10px 0;padding:11px;border-radius:12px;background:rgba(201,170,124,.08);border:1.5px dashed rgba(201,170,124,.25);color:var(--gold);font-size:13px;font-weight:600;font-family:'Mulish',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 20px)}
.drawer-pdf-btn{margin:6px 10px 0;padding:10px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;font-family:'Mulish',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 20px);transition:background .15s}
.drawer-pdf-btn:active{background:rgba(255,255,255,.08)}
.drawer-footer{padding:14px 16px calc(14px + var(--safe));border-top:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--text3);line-height:1.6}

/* PAGES */
.page{position:absolute;inset:0;background:var(--bg);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s ease;will-change:transform}
.page::-webkit-scrollbar{display:none}
.page.page-hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.page.page-hidden-left{transform:translateX(-25%);opacity:0;pointer-events:none}

/* HEADER */
.header{padding:calc(var(--top) + 14px) 16px 12px;background:var(--bg);position:sticky;top:0;z-index:10}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border)}
.header-row{display:flex;align-items:center;gap:10px}
.burger{width:38px;height:38px;border-radius:10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4.5px;flex-shrink:0}
.burger-line{width:16px;height:1.5px;background:var(--text2);border-radius:1px}
.header-title{flex:1;min-width:0}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo span{color:var(--gold)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;gap:7px;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--gold);background:none;border:none;cursor:pointer;padding:4px 0;font-family:'Mulish',sans-serif}

/* CONTENT */
.content{padding:16px 16px calc(32px + var(--safe))}

/* TOTAL BUDGET BANNER */
.budget-banner{
  background:linear-gradient(135deg, rgba(201,170,124,.12), rgba(201,170,124,.04));
  border:1px solid rgba(201,170,124,.25);
  border-radius:16px;padding:16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  animation:fadeUp .35s ease both;
}
.bb-left{}
.bb-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.bb-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:var(--gold)}
.bb-sub{font-size:11px;color:var(--text3);margin-top:3px}
.bb-edit{background:rgba(201,170,124,.12);border:1px solid rgba(201,170,124,.2);color:var(--gold);border-radius:10px;padding:9px 11px;font-size:16px;cursor:pointer;flex-shrink:0;line-height:1}

/* SUMMARY STRIP */
.summary-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;animation:fadeUp .4s ease both}
.sum-card.full{grid-column:1/-1}
.sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.sum-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:600;line-height:1}
.sum-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* BUDGET HEALTH BAR */
.health-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;animation:fadeUp .4s ease both}
.health-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px}
.health-track{height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;position:relative}
.health-bar-smeta{height:100%;border-radius:5px;position:absolute;top:0;left:0;transition:width .7s ease}
.health-bar-fact{height:100%;border-radius:5px;position:absolute;top:0;left:0;transition:width .7s ease}
.health-legend{display:flex;gap:14px;margin-top:8px}
.hl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.hl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* SECTION */
.section-divider{height:1px;background:var(--border);margin:6px 0 16px;position:relative}
.section-divider::before{content:'';position:absolute;left:0;top:-1px;width:40px;height:3px;background:var(--gold);border-radius:2px}
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px;margin-top:4px}

/* STAGE CARDS */
.stage-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .18s;animation:fadeUp .4s ease both;position:relative}
.stage-card:active{transform:scale(.97)}
.stage-card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.stage-card-body{padding:14px 16px 12px;display:flex;align-items:center;gap:14px}
.stage-card-icon{font-size:26px;flex-shrink:0}
.stage-card-info{flex:1;min-width:0}
.stage-card-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-card-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.stage-card-bar{height:3px;background:rgba(255,255,255,.05);margin:0 16px 0;border-radius:2px;overflow:hidden}
.stage-card-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
/* two-layer bar */
.stage-card-bar-track{height:4px;background:rgba(255,255,255,.05);margin:0 16px 12px;border-radius:2px;overflow:hidden;position:relative}
.scb-smeta{position:absolute;top:0;left:0;height:100%;border-radius:2px;opacity:.4}
.scb-fact{position:absolute;top:0;left:0;height:100%;border-radius:2px}
.stage-card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.scs-item{background:var(--bg2);padding:9px 12px}
.scs-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.scs-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}

/* DETAIL */
.detail-hero{padding:calc(var(--top) + 14px) 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.detail-hero-name{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px}
.detail-hero-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:10px}
.detail-two-bar{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;position:relative;margin-bottom:0}
.dtb-smeta{position:absolute;top:0;left:0;height:100%;border-radius:3px;opacity:.4;transition:width .5s}
.dtb-fact{position:absolute;top:0;left:0;height:100%;border-radius:3px;transition:width .5s}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}

/* ITEMS */
.items-section{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:12px}
.items-header{padding:10px 16px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:32px 1fr auto 32px;gap:8px;align-items:center}
.item-row{display:grid;grid-template-columns:32px 1fr auto 32px;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .15s;animation:itemIn .22s ease both}
.item-row:last-child{border-bottom:none}
@keyframes itemIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.item-check{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(255,255,255,.2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.item-check.done{border-color:transparent}
.item-name{font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-name.done{text-decoration:line-through;color:var(--text3)}
.item-cost{font-family:'DM Mono',monospace;font-size:12px;white-space:nowrap;color:var(--text2)}
.item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .2s}
.item-del:active{background:rgba(204,123,123,.2);color:var(--red)}

.add-form{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:14px 16px;margin-bottom:12px}
.add-form-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.add-form-row{display:flex;gap:8px;margin-top:8px}

input[type=text],input[type=number]{background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 12px;font-family:'Mulish',sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .2s;-webkit-appearance:none}
input:focus{border-color:rgba(255,255,255,.3)}

.btn{cursor:pointer;border:none;border-radius:12px;font-family:'Mulish',sans-serif;font-weight:600;font-size:14px;padding:12px 16px;transition:transform .15s,opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:#0D0F14;width:100%}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text2);flex:1}
.btn-danger{background:rgba(204,123,123,.15);color:var(--red)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn-icon{padding:9px;border-radius:10px;background:none;border:none}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:24px 20px calc(24px + var(--safe));max-height:92vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px}
.icon-opt{width:42px;height:42px;border-radius:10px;border:1.5px solid transparent;background:rgba(255,255,255,.05);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-opt.sel{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.color-opt.sel{border-color:white;transform:scale(1.15)}

.toast{position:fixed;top:calc(var(--top) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:300;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.install-banner{background:linear-gradient(135deg,rgba(201,170,124,.12),rgba(127,184,204,.08));border:1px solid rgba(201,170,124,.25);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.install-banner-text{flex:1;font-size:12px;color:var(--text2);line-height:1.4}
.install-banner-text strong{color:var(--gold);display:block;font-size:13px;margin-bottom:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.c-gold{color:var(--gold)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-red{color:var(--red)}

/* OVER BUDGET WARNING */
.over-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(204,123,123,.15);border:1px solid rgba(204,123,123,.3);color:var(--red);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div id="drawerBackdrop" onclick="closeDrawer()"></div>
  <div id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">🏡 Строим Дом</div>
      <div class="drawer-sub">Мои объекты</div>
    </div>
    <div class="drawer-scroll">
      <div class="drawer-section-label">Объекты</div>
      <div id="drawerObjects"></div>
      <button class="drawer-add-btn" onclick="addObjectPrompt()">＋ Новый объект</button>
      <button class="drawer-pdf-btn" onclick="closeDrawer();exportPDF()">📄 Экспорт PDF</button>
    </div>
    <div class="drawer-footer">💾 Данные хранятся на этом устройстве</div>
  </div>

  <div class="page" id="pageDash">
    <div class="header">
      <div class="header-row">
        <button class="burger" onclick="openDrawer()">
          <div class="burger-line"></div><div class="burger-line"></div><div class="burger-line"></div>
        </button>
        <div class="header-title">
          <div class="logo" id="headerTitle">Строим <span>Дом</span></div>
          <div class="logo-sub" id="headerSub"></div>
        </div>
        <div class="header-actions">
          <button class="btn btn-icon" id="btnAdd" style="font-size:22px;color:var(--gold)">＋</button>
        </div>
      </div>
    </div>
    <div class="content" id="dashContent"></div>
  </div>

  <div class="page page-hidden-right" id="pageDetail">
    <div class="detail-hero" id="detailHero"></div>
    <div class="content" id="detailContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════
//  FORMAT
// ══════════════════════════
const fmt = n => {
  try{ return new Intl.NumberFormat('az-AZ',{style:'currency',currency:'AZN',maximumFractionDigits:0}).format(n); }
  catch{ return Math.round(n).toLocaleString()+' ₼'; }
};
const fmtShort = n => {
  const abs=Math.abs(n),s=n<0?'−':'';
  if(abs>=1e6) return s+(abs/1e6).toFixed(1).replace('.0','')+' млн ₼';
  if(abs>=1e3) return s+(abs/1e3).toFixed(0)+' тыс ₼';
  return fmt(n);
};

// ══════════════════════════
//  DATA
//  Объект: { id, name, icon, totalBudget, stages[] }
//  Этап:   { id, name, icon, color, items[] }  — бюджета нет!
//  Позиция:{ id, name, cost, done }
// ══════════════════════════
const STORE_KEY='isapp_v5';

const DEFAULT_OBJECT={

  totalBudget: 7630000, // общий бюджет на весь объект
  stages:[

      {id:2,name:'Арматура и опалубка',cost:180000,done:true},
      {id:3,name:'Бетон',cost:220000,done:true},

      {id:4,name:'Фронтоны',cost:120000,done:false},
      {id:5,name:'Стропила',cost:280000,done:false},
    ]},
    {id:3,name:'Кровля',icon:'🏠',color:'#CC7B7B',items:[
      {id:1,name:'Утеплитель',cost:120000,done:false},
      {id:2,name:'Кровельный материал',cost:320000,done:false},
      {id:3,name:'Водосток',cost:85000,done:false},
      {id:4,name:'Доборные элементы',cost:55000,done:false},
    ]},
    {id:4,name:'Окна и двери',icon:'🪟',color:'#9E8ED4',items:[
      {id:1,name:'Окна ПВХ',cost:280000,done:false},
      {id:2,name:'Входная дверь',cost:85000,done:false},
      {id:3,name:'Межкомнатные двери',cost:120000,done:false},
      {id:4,name:'Монтаж',cost:35000,done:false},

function loadDB(){

let db=loadDB();
let activeStageId=null;

const curObj=()=>db.objects.find(o=>o.id===db.activeObjectId)||db.objects[0];
const stages=()=>curObj().stages;

// ── Вычисления (без бюджета этапа) ──
const itemCost    = i => i.cost||0;
const stageSmeta  = s => s.items.reduce((a,i)=>a+itemCost(i),0);       // полная смета этапа
const stageFact   = s => s.items.filter(i=>i.done).reduce((a,i)=>a+itemCost(i),0); // реально потрачено
const totalSmeta  = () => stages().reduce((a,s)=>a+stageSmeta(s),0);
const totalFact   = () => stages().reduce((a,s)=>a+stageFact(s),0);
const totalBudget = () => curObj().totalBudget||0;

const newId=()=>Date.now()+Math.floor(Math.random()*999);
const OBJ_ICONS=['🏠','🏡','🏗','🏢','🏬','🏭','🌳','🌿','🏊','🔑','⬛','🧱'];
const ICONS=['🏠','🏗','⬛','🪟','⚙️','🎨','🌿','🧱','🔧','💡','🚿','🛠','🏡','🌲','🪣','🔑','🏊','🌳'];
const COLORS=['#C9AA7C','#7BB8CC','#CC7B7B','#9E8ED4','#80C89A','#C8C07E','#CC9B7B','#7BC4CC','#B87BB8','#7BA8CC'];

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=(type==='ok'?'✓ ':type==='err'?'✕ ':'')+msg;
  t.className='toast show';clearTimeout(t._to);
  t._to=setTimeout(()=>{t.className='toast'},2400);
}

function renderDrawer(){
  document.getElementById('drawerObjects').innerHTML=db.objects.map(o=>{

function switchObject(id){

function editObjectPrompt(id){
  closeDrawer();const o=db.objects.find(x=>x.id===id);if(!o)return;
  window._objfd={id,name:o.name,icon:o.icon,budget:o.totalBudget||''};
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">Редактировать объект</div>
    <div class="form-group"><label class="form-label">Название</label>
      <input type="text" id="oName" value="${o.name}"/></div>
    <div class="form-group"><label class="form-label">Общий бюджет (₼)</label>
      <input type="number" id="oBudget" value="${o.totalBudget||''}"/></div>
    <div class="form-group"><label class="form-label">Иконка</label>
      <div class="icon-grid">${OBJ_ICONS.map(ic=>`<div class="icon-opt ${ic===o.icon?'sel':''}" onclick="selObjIcon('${ic}')">${ic}</div>`).join('')}</div></div>

      <button class="btn btn-primary" style="flex:1" onclick="saveObject()">Сохранить</button>
    </div>`);
}
function selObjIcon(ic){window._objfd.icon=ic;document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('sel',el.textContent===ic));}
function createObject(){
  const name=document.getElementById('oName')?.value.trim();
  const budget=parseInt(document.getElementById('oBudget')?.value)||0;
  if(!name){showToast('Введите название','err');return;}
  const id=newId();
  db.objects.push({id,name,icon:window._objfd.icon||'🏠',totalBudget:budget,stages:[]});
  db.activeObjectId=id;activeStageId=null;
  saveDB();closeModal();renderDash();showToast('Объект создан');
}
function saveObject(){
  const name=document.getElementById('oName')?.value.trim();
  const budget=parseInt(document.getElementById('oBudget')?.value)||0;
  if(!name){showToast('Введите название','err');return;}
  const id=window._objfd.id;
  db.objects=db.objects.map(o=>o.id===id?{...o,name,icon:window._objfd.icon||o.icon,totalBudget:budget}:o);
  saveDB();closeModal();renderDash();showToast('Сохранено');
}
function deleteObjectConfirm(id){
  if(db.objects.length<=1){showToast('Нельзя удалить единственный объект','err');return;}
  const o=db.objects.find(x=>x.id===id);closeModal();
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">Удалить «${o.name}»?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px">Все данные будут удалены навсегда.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-danger" style="flex:1" onclick="deleteObject(${id})">Удалить</button>
    </div>`);
}
function deleteObject(id){
  db.objects=db.objects.filter(o=>o.id!==id);
  if(db.activeObjectId===id)db.activeObjectId=db.objects[0].id;
  activeStageId=null;saveDB();closeModal();renderDash();showToast('Объект удалён');
}

let txS=0,tyS=0,swD=null;
document.getElementById('pageDetail').addEventListener('touchstart',e=>{txS=e.touches[0].clientX;tyS=e.touches[0].clientY;swD=null;},{passive:true});
document.getElementById('pageDetail').addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-txS,dy=e.touches[0].clientY-tyS;
  if(!swD)swD=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(swD==='h'&&dx>0)document.getElementById('pageDetail').style.transform=`translateX(${Math.max(0,dx)}px)`;
},{passive:true});
document.getElementById('pageDetail').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-txS;
  document.getElementById('pageDetail').style.transform='';
  if(swD==='h'&&dx>80)goBack();
},{passive:true});

function ringHTML(pct,color,size){
  const r=(size-7)/2,circ=2*Math.PI*r,dash=Math.min(pct,100)/100*circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="600">${Math.round(Math.min(pct,100))}%</text>
  </svg>`;
}

// ══════════════════════════
function updateStages(fn){
  db.objects=db.objects.map(o=>o.id===db.activeObjectId?{...o,stages:fn(o.stages)}:o);
  saveDB();
}
function toggleItem(stageId,itemId){
  updateStages(ss=>ss.map(s=>s.id!==stageId?s:{...s,items:s.items.map(i=>i.id===itemId?{...i,done:!i.done}:i)}));
  renderDetail();
}
function deleteItem(stageId,itemId){
  updateStages(ss=>ss.map(s=>s.id!==stageId?s:{...s,items:s.items.filter(i=>i.id!==itemId)}));
  renderDetail();showToast('Позиция удалена');
}
function addItem(stageId){
  const name=document.getElementById('newItemName')?.value.trim();
  const cost=parseInt(document.getElementById('newItemCost')?.value);
  if(!name){showToast('Введите название','err');return;}
  if(!cost||cost<=0){showToast('Введите стоимость','err');return;}
  updateStages(ss=>ss.map(s=>s.id!==stageId?s:{...s,items:[...s.items,{id:newId(),name,cost,done:false}]}));
  renderDetail();showToast('Позиция добавлена');
}
function confirmDeleteStage(id){
  const s=stages().find(st=>st.id===id);if(!s)return;
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">Удалить «${s.name}»?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px">Этап и все позиции будут удалены навсегда.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-danger" style="flex:1" onclick="deleteStage(${id})">Удалить</button>
    </div>`);
}
function deleteStage(id){
  updateStages(ss=>ss.filter(s=>s.id!==id));
  saveDB();closeModal();goBack();showToast('Этап удалён');
}
function showStageModal(existing){
  const isEdit=!!existing,data=existing||{name:'',icon:'🏠',color:'#7BB8CC'};
  window._sfd={...data};
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">${isEdit?'Редактировать этап':'Новый этап'}</div>
    <div class="form-group"><label class="form-label">Название</label>
      <input type="text" id="sName" placeholder="Например: Благоустройство" value="${data.name}"/></div>
    <div class="form-group"><label class="form-label">Иконка</label>
      <div class="icon-grid">${ICONS.map(ic=>`<div class="icon-opt ${ic===data.icon?'sel':''}" onclick="selIcon('${ic}')">${ic}</div>`).join('')}</div></div>
    <div class="form-group"><label class="form-label">Цвет</label>
      <div class="color-grid">${COLORS.map(c=>`<div class="color-opt ${c===data.color?'sel':''}" style="background:${c}" onclick="selColor('${c}')"></div>`).join('')}</div></div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:16px;line-height:1.5">
      💡 Бюджет этапа складывается автоматически из стоимости добавленных позиций.
    </p>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveStage('${isEdit?data.id:''}')">${isEdit?'Сохранить':'Создать'}</button>
    </div>`);
}
function selIcon(ic){window._sfd.icon=ic;document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('sel',el.textContent===ic))}
function selColor(c){window._sfd.color=c;document.querySelectorAll('.color-opt').forEach(el=>el.classList.toggle('sel',el.getAttribute('onclick')===`selColor('${c}')`))}
function saveStage(editId){
  const name=document.getElementById('sName')?.value.trim();
  const icon=window._sfd?.icon||'🏠',color=window._sfd?.color||'#7BB8CC';
  if(!name){showToast('Введите название','err');return;}
  if(editId){
    const id=parseInt(editId);
    updateStages(ss=>ss.map(s=>s.id===id?{...s,name,icon,color}:s));
    showToast('Этап обновлён');
  } else {
    updateStages(ss=>[...ss,{id:newId(),name,icon,color,items:[]}]);
    showToast('Этап добавлен');
  }
  closeModal();
  if(document.getElementById('pageDetail').classList.contains('page-hidden-right'))renderDash();
  else{renderDash();renderDetail();}
}
function editStage(id){const s=stages().find(st=>st.id===id);if(s)showStageModal(s);}

// ══════════════════════════
//  MODAL
// ══════════════════════════
function showModal(html){
  closeModal();
  const bd=document.createElement('div');
  bd.className='modal-backdrop';bd.id='modalBackdrop';
  bd.innerHTML=`<div class="modal">${html}</div>`;
  bd.addEventListener('click',e=>{if(e.target===bd)closeModal();});
  document.body.appendChild(bd);
}
function closeModal(){document.getElementById('modalBackdrop')?.remove();}

// ══════════════════════════
//  PDF
// ══════════════════════════
function exportPDF(){
  const obj=curObj();const st=stages();
  const tb=totalBudget(),ts=totalSmeta(),tf=totalFact();
  const now=new Date();
  const dateStr=now.toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});
  const factPct=ts>0?Math.min(tf/ts*100,100):0;
  const smetaVsBudget=tb>0?Math.min(ts/tb*100,100):0;
  const isOver=ts>tb&&tb>0;

  const stagesHTML=st.map(s=>{
    const smeta=stageSmeta(s),fact=stageFact(s);
    const fp=smeta>0?Math.min(fact/smeta*100,100):0;
    const done=s.items.filter(i=>i.done).length;
    return `<div class="stage-block">
      <div class="stage-header" style="border-left:4px solid ${s.color}">
        <div><div class="stage-name">${s.icon} ${s.name}</div><div class="stage-sub">${done} из ${s.items.length} позиций выполнено</div></div>
        <div class="stage-pct" style="color:${s.color}">${Math.round(fp)}%</div>
      </div>
      <div class="stage-stats">
        <div class="stat-cell"><div class="stat-label">Смета</div><div class="stat-value gold">${fmt(smeta)}</div></div>
        <div class="stat-cell"><div class="stat-label">Потрачено</div><div class="stat-value green">${fmt(fact)}</div></div>
        <div class="stat-cell"><div class="stat-label">Остаток</div><div class="stat-value ${smeta-fact<0?'red':'blue'}">${fmt(smeta-fact)}</div></div>
      </div>
      <div class="progress-wrap">
        <div class="pb-smeta" style="width:100%;background:${s.color}22"></div>
        <div class="pb-fact" style="width:${fp}%;background:${s.color}"></div>
      </div>
      ${s.items.length>0?`<table class="items-table"><thead><tr><th style="width:24px"></th><th style="text-align:left">Позиция</th><th style="text-align:right">Сумма</th><th style="text-align:center;width:70px">Статус</th></tr></thead><tbody>
        ${s.items.map((item,ii)=>`<tr class="${ii%2===0?'row-even':'row-odd'} ${item.done?'done-row':''}">
          <td style="text-align:center"><span class="dot" style="background:${item.done?s.color:'transparent'};border:1.5px solid ${item.done?s.color:'#aaa'};color:${item.done?'#fff':'transparent'}">${item.done?'✓':''}</span></td>
          <td class="item-name-cell">${item.name}</td>
          <td style="text-align:right;font-family:monospace;font-size:12px">${fmt(item.cost)}</td>
          <td style="text-align:center"><span class="badge ${item.done?'badge-done':'badge-plan'}" style="${item.done?'background:'+s.color+'22;color:'+s.color+';border-color:'+s.color+'44':''}">${item.done?'Готово':'План'}</span></td>
        </tr>`).join('')}
      </tbody><tfoot><tr class="total-row">
        <td colspan="2"><b>Итого потрачено</b></td>
        <td style="text-align:right;font-family:monospace"><b>${fmt(fact)}</b></td>
        <td style="text-align:center;font-size:11px;color:#888">из ${fmt(smeta)}</td>
      </tr></tfoot></table>`:'<div class="no-items">Позиции не добавлены</div>'}
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Mulish',sans-serif;background:#fff;color:#1a1a2e;font-size:13px;line-height:1.5}
  @page{size:A4;margin:16mm 14mm}
  .doc-header{background:#0D0F14;color:#EAE6DE;padding:20px 24px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
  .doc-title{font-size:22px;font-weight:700;color:#C9AA7C;margin-bottom:4px}
  .doc-sub{font-size:12px;color:#888}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
  .sum-box{border-radius:8px;padding:14px 16px;border:1px solid #e8e4dc}
  .sum-box-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#999;margin-bottom:6px}
  .sum-box-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:700}
  .sum-box-sub{font-size:11px;color:#aaa;margin-top:4px}
  .gold{color:#b8924a}.green{color:#4a9b6a}.blue{color:#4a7fb8}.red{color:#b84a4a}
  .budget-row{background:#f9f7f3;border:1px solid #e8d8b8;border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .br-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
  .br-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:#b8924a}
  .br-warn{font-size:12px;color:#b84a4a;margin-top:4px;font-weight:600}
  .prog-section{margin-bottom:20px}
  .prog-label{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:6px}
  .prog-track{height:10px;background:#e8e4dc;border-radius:5px;overflow:hidden;position:relative;margin-bottom:6px}
  .prog-smeta{position:absolute;top:0;left:0;height:100%;background:#C9AA7C;opacity:.35;border-radius:5px}
  .prog-fact{position:absolute;top:0;left:0;height:100%;background:#80C89A;border-radius:5px}
  .prog-legend{display:flex;gap:16px}
  .pl-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#999}
  .pl-dot{width:10px;height:10px;border-radius:3px}
  .section-divider{display:flex;align-items:center;gap:10px;margin:0 0 16px}
  .section-divider-line{flex:1;height:1px;background:#e0ddd8}
  .section-divider-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999}
  .stage-block{border:1px solid #e8e4dc;border-radius:10px;margin-bottom:16px;overflow:hidden;break-inside:avoid}
  .stage-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f9f8f6}
  .stage-name{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
  .stage-sub{font-size:11px;color:#999}
  .stage-pct{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
  .stage-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8e4dc;border-top:1px solid #e8e4dc;border-bottom:1px solid #e8e4dc}
  .stat-cell{background:#fff;padding:10px 12px}
  .stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#aaa;margin-bottom:4px}
  .stat-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
  .progress-wrap{height:6px;background:#f0ede8;position:relative}
  .pb-smeta{position:absolute;top:0;left:0;height:100%}
  .pb-fact{position:absolute;top:0;left:0;height:100%}
  .items-table{width:100%;border-collapse:collapse}
  .items-table thead tr{background:#f5f3ef}
  .items-table th{padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#999;border-bottom:1px solid #e8e4dc}
  .row-even{background:#fff}.row-odd{background:#faf9f7}
  .done-row .item-name-cell{color:#aaa;text-decoration:line-through}
  .items-table td{padding:8px 10px;border-bottom:1px solid #f0ede8;font-size:12.5px}
  .dot{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:700}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid}
  .badge-done{background:#f0faf5;color:#4a9b6a;border-color:#b0dfc5}
  .badge-plan{background:#f5f3ef;color:#aaa;border-color:#ddd}
  .total-row{background:#f0ede8}.total-row td{padding:9px 10px;border-top:1.5px solid #ddd}
  .no-items{padding:14px 16px;font-size:12px;color:#bbb;font-style:italic}
  .doc-footer{margin-top:24px;padding-top:12px;border-top:1px solid #e8e4dc;display:flex;justify-content:space-between;font-size:10px;color:#bbb}
  @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style></head><body>
  <div class="doc-header">
    <div><div class="doc-title">${obj.icon} ${obj.name}</div><div class="doc-sub">Отчёт о бюджете строительства</div></div>
    <div style="font-size:11px;color:#666;text-align:right">${dateStr}</div>
  </div>

  ${tb>0?`<div class="budget-row">
    <div><div class="br-label">Общий бюджет объекта</div><div class="br-val">${fmt(tb)}</div>
    ${isOver?`<div class="br-warn">⚠️ Смета превышает бюджет на ${fmt(ts-tb)}</div>`:
    `<div style="font-size:12px;color:#4a9b6a;margin-top:4px">✓ Остаток бюджета: ${fmt(tb-ts)}</div>`}
    </div>
    <div style="text-align:right"><div class="br-label">Смета покрывает</div><div style="font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:${isOver?'#b84a4a':'#b8924a'}">${Math.round(smetaVsBudget)}%</div></div>
  </div>`:''}

  <div class="summary-grid">
    <div class="sum-box" style="border-top:3px solid #C9AA7C"><div class="sum-box-label">Смета (план)</div><div class="sum-box-val gold">${fmt(ts)}</div><div class="sum-box-sub">все позиции · ${st.length} этапов</div></div>
    <div class="sum-box" style="border-top:3px solid #80C89A"><div class="sum-box-label">Потрачено (факт)</div><div class="sum-box-val green">${fmt(tf)}</div><div class="sum-box-sub">${Math.round(factPct)}% от сметы</div></div>
    <div class="sum-box" style="border-top:3px solid #7BB8CC"><div class="sum-box-label">Осталось потратить</div><div class="sum-box-val blue">${fmt(ts-tf)}</div><div class="sum-box-sub">по смете</div></div>
  </div>

  <div class="prog-section">
    <div class="prog-label"><span>Прогресс выполнения</span><span style="font-family:'DM Mono',monospace;font-weight:700;color:#80C89A">${Math.round(factPct)}% от сметы</span></div>
    <div class="prog-track">
      <div class="prog-smeta" style="width:100%"></div>
      <div class="prog-fact" style="width:${factPct}%"></div>
    </div>
    <div class="prog-legend">
      <div class="pl-item"><div class="pl-dot" style="background:#C9AA7C;opacity:.4"></div>Смета ${fmt(ts)}</div>
      <div class="pl-item"><div class="pl-dot" style="background:#80C89A"></div>Факт ${fmt(tf)}</div>
      <div class="pl-item"><div class="pl-dot" style="background:#e8e4dc"></div>Осталось ${fmt(ts-tf)}</div>
    </div>
  </div>

  <div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-title">Этапы строительства</div><div class="section-divider-line"></div></div>
  ${stagesHTML}
  <div class="doc-footer"><span>${obj.icon} ${obj.name} — бюджет строительства</span><span>${dateStr}</span></div>
  </body></html>`;

  const w=window.open('','_blank','width=900,height=700');
  w.document.write(html);w.document.close();
  w.onload=()=>{w.focus();w.print();};
  showToast('Открываю PDF...');
}

// ══════════════════════════
//  INSTALL
// ══════════════════════════
window._installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();window._installPrompt=e;renderDash();});
function installApp(){
  if(!window._installPrompt)return;
  window._installPrompt.prompt();
  window._installPrompt.userChoice.then(()=>{window._installPrompt=null;renderDash();});
}

document.getElementById('btnAdd').onclick=()=>showStageModal(null);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
renderDash();
</script>
</body>
</html>
