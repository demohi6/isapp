<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tikinti"/>
<meta name="theme-color" content="#0D0F14"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png"/>
<link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png"/>
<title>Tikinti</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Mulish:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0F14;--bg2:#13161C;--bg3:#1A1E27;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#EAE6DE;--text2:rgba(234,230,222,0.55);--text3:rgba(234,230,222,0.28);
  --gold:#C9AA7C;--blue:#7BB8CC;--green:#80C89A;--red:#CC7B7B;
  --safe:env(safe-area-inset-bottom,0px);--top:env(safe-area-inset-top,0px);
  --drawer:285px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;overflow:hidden}
#app{position:fixed;inset:0;overflow:hidden}

/* DRAWER */
#drawerBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:90;pointer-events:none;transition:background .3s}
#drawerBackdrop.open{background:rgba(0,0,0,.6);pointer-events:all}
#drawer{position:fixed;top:0;left:0;bottom:0;width:var(--drawer);background:#0f1118;border-right:1px solid var(--border2);z-index:100;transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#drawer.open{transform:translateX(0)}
.drawer-header{padding:calc(var(--top) + 20px) 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:2px}
.drawer-sub{font-size:11px;color:var(--text3)}
.drawer-scroll{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch}
.drawer-scroll::-webkit-scrollbar{display:none}
.drawer-section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:4px 10px 8px}
.obj-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;margin-bottom:2px}
.obj-item.active{background:rgba(201,170,124,.12);border:1px solid rgba(201,170,124,.2)}
.obj-item:not(.active){border:1px solid transparent}
.obj-icon{font-size:20px;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:9px}
.obj-info{flex:1;min-width:0}
.obj-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.obj-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.obj-active-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0}
.drawer-btn{margin:6px 10px 0;padding:11px;border-radius:12px;font-size:13px;font-weight:600;font-family:'Mulish',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 20px);transition:background .15s;border:none}
.drawer-btn-add{background:rgba(201,170,124,.08);border:1.5px dashed rgba(201,170,124,.25) !important;color:var(--gold)}
.drawer-btn-pdf{background:rgba(255,255,255,.04);border:1px solid var(--border) !important;color:var(--text2)}
.drawer-footer{padding:14px 16px calc(14px + var(--safe));border-top:1px solid var(--border);flex-shrink:0}

/* LANG SWITCHER */
.lang-switch{display:flex;gap:4px;margin-bottom:10px}
.lang-btn{flex:1;padding:6px 4px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text3);font-size:11px;font-weight:700;font-family:'Mulish',sans-serif;cursor:pointer;transition:all .2s;text-align:center}
.lang-btn.active{background:rgba(201,170,124,.15);border-color:rgba(201,170,124,.4);color:var(--gold)}

/* PAGES */
.page{position:absolute;inset:0;background:var(--bg);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s ease;will-change:transform}
.page::-webkit-scrollbar{display:none}
.page.page-hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.page.page-hidden-left{transform:translateX(-25%);opacity:0;pointer-events:none}

/* HEADER */
.header{padding:calc(var(--top) + 14px) 16px 12px;background:var(--bg);position:sticky;top:0;z-index:10}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border)}
.header-row{display:flex;align-items:center;gap:10px}
.burger{width:38px;height:38px;border-radius:10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4.5px;flex-shrink:0}
.burger-line{width:16px;height:1.5px;background:var(--text2);border-radius:1px}
.header-title{flex:1;min-width:0}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo span{color:var(--gold)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--gold);background:none;border:none;cursor:pointer;padding:4px 0;font-family:'Mulish',sans-serif}

.content{padding:16px 16px calc(32px + var(--safe))}

/* BUDGET BANNER */
.budget-banner{
  background:linear-gradient(135deg,rgba(201,170,124,.12),rgba(201,170,124,.04));
  border:1px solid rgba(201,170,124,.25);
  border-radius:16px;padding:16px;margin-bottom:14px;
  display:block;
  animation:fadeUp .35s ease both;
}
.bb-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.bb-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:var(--gold);margin-bottom:2px}
.bb-sub{font-size:11px;color:var(--text3);margin-bottom:0}

/* SECTION */
.section-divider{height:1px;background:var(--border);margin:6px 0 16px;position:relative}
.section-divider::before{content:'';position:absolute;left:0;top:-1px;width:40px;height:3px;background:var(--gold);border-radius:2px}
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px;margin-top:4px}

/* STAGE CARDS */
.stage-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .18s;animation:fadeUp .4s ease both;position:relative;-webkit-user-select:none;user-select:none}
.stage-card:active{transform:scale(.97)}
.stage-card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.stage-card-body{padding:14px 16px 12px;display:flex;align-items:center;gap:14px}
.stage-card-icon{font-size:26px;flex-shrink:0}
.stage-card-info{flex:1;min-width:0}
.stage-card-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-card-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.stage-card-bar-track{height:4px;background:rgba(255,255,255,.05);margin:0 16px 0;border-radius:2px;overflow:hidden;position:relative}
.scb-smeta{position:absolute;top:0;left:0;height:100%;border-radius:2px;opacity:.35}
.scb-fact{position:absolute;top:0;left:0;height:100%;border-radius:2px}
.stage-card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.scs-item{background:var(--bg2);padding:9px 12px}
.scs-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.scs-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}

/* DETAIL */
.detail-hero{padding:calc(var(--top) + 14px) 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.detail-hero-name{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px}
.detail-hero-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:10px}
.detail-two-bar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;position:relative;margin-bottom:0}
.dtb-smeta{position:absolute;top:0;left:0;height:100%;border-radius:3px;opacity:.35;transition:width .5s}
.dtb-fact{position:absolute;top:0;left:0;height:100%;border-radius:3px;transition:width .5s}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}

/* ITEMS */
.items-section{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:12px}
.items-header{padding:10px 16px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:32px 1fr auto 32px;gap:8px;align-items:center}
.item-row{display:grid;grid-template-columns:32px 1fr auto 32px;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .15s;animation:itemIn .22s ease both;cursor:pointer}
.item-row:last-child{border-bottom:none}
.item-row:active{background:rgba(255,255,255,.03)}
@keyframes itemIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.item-check{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(255,255,255,.2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.item-check.done{border-color:transparent}
.item-name{font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-name.done{text-decoration:line-through;color:var(--text3)}
.item-cost{font-family:'DM Mono',monospace;font-size:12px;white-space:nowrap;color:var(--text2)}
.item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .2s}
.item-del:active{background:rgba(204,123,123,.2);color:var(--red)}

/* ITEM NOTE */
.item-note{font-size:11px;color:var(--text3);padding:0 16px 8px 56px;font-style:italic}

.add-form{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:14px 16px;margin-bottom:12px}
.add-form-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.add-form-row{display:flex;gap:8px;margin-top:8px}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;margin-bottom:10px}
.filter-tab{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text3);font-size:12px;font-weight:600;font-family:'Mulish',sans-serif;cursor:pointer;transition:all .2s}
.filter-tab.active{background:rgba(201,170,124,.15);border-color:rgba(201,170,124,.35);color:var(--gold)}

input[type=text],input[type=number],textarea{background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 12px;font-family:'Mulish',sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .2s;-webkit-appearance:none}
textarea{resize:none;height:72px;line-height:1.4}
input:focus,textarea:focus{border-color:rgba(255,255,255,.3)}

.btn{cursor:pointer;border:none;border-radius:12px;font-family:'Mulish',sans-serif;font-weight:600;font-size:14px;padding:12px 16px;transition:transform .15s,opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:#0D0F14;width:100%}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text2);flex:1}
.btn-danger{background:rgba(204,123,123,.15);color:var(--red)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn-icon{padding:9px;border-radius:10px;background:none;border:none}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:20px 20px calc(20px + var(--safe));max-height:85vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:12px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px}
.icon-opt{width:42px;height:42px;border-radius:10px;border:1.5px solid transparent;background:rgba(255,255,255,.05);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-opt.sel{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.color-opt.sel{border-color:white;transform:scale(1.15)}

/* QTY × PRICE */
.qty-price-row{display:grid;grid-template-columns:1fr 16px 1fr;align-items:center;gap:6px;margin-top:8px}

/* DRUM PICKER */
.drum-picker{display:flex;gap:0;justify-content:center;margin:12px 0;animation:fadeUp .25s ease}
.drum-col{display:flex;flex-direction:column;align-items:center;flex:1}
.drum-col-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
.drum-wrap{
  position:relative;height:220px;width:100%;overflow:hidden;
  background:none;cursor:pointer;
}
.drum-wrap::before,.drum-wrap::after{
  content:'';position:absolute;left:0;right:0;height:88px;z-index:2;pointer-events:none;
}
.drum-wrap::before{top:0;background:linear-gradient(to bottom,var(--bg2) 40%,rgba(13,15,20,.85) 70%,transparent 100%)}
.drum-wrap::after{bottom:0;background:linear-gradient(to top,var(--bg2) 40%,rgba(13,15,20,.85) 70%,transparent 100%)}
.drum-selector{
  position:absolute;top:50%;left:8px;right:8px;height:44px;
  transform:translateY(-50%);
  pointer-events:none;z-index:1;
  border-top:1px solid rgba(201,170,124,.6);
  border-bottom:1px solid rgba(201,170,124,.6);
}
.drum-divider{width:1px;background:rgba(255,255,255,.07);height:220px;flex-shrink:0}
.drum-list{
  position:absolute;width:100%;
  will-change:transform;
  user-select:none;-webkit-user-select:none;
}
.drum-item{
  height:44px;display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:13px;font-weight:400;
  color:rgba(234,230,222,.15);
  transition:color .1s,font-size .1s,font-weight .1s;
}
.drum-item.near{color:rgba(234,230,222,.4);font-size:15px}
.drum-item.active{color:var(--text);font-size:18px;font-weight:700}
.drum-date-display{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:12px;padding:11px 14px;margin:4px 0;
  font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);
  text-align:center;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.drum-date-display:active{transform:scale(.98)}
.drum-date-display.has-value{color:var(--gold);border-color:rgba(201,170,124,.3);background:rgba(201,170,124,.06)}
.drum-date-display .cal-icon{font-size:16px;opacity:.5}
.search-wrap{position:relative;margin-bottom:12px}
.search-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:10px 12px;color:var(--text);font-family:'Mulish',sans-serif;font-size:14px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none}
.search-input:focus{border-color:rgba(255,255,255,.25)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:2px 6px}
.pin-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeIn .2s ease}
.pin-logo{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px}
.pin-subtitle{font-size:13px;color:var(--text3)}
.pin-dots{display:flex;gap:14px;margin:4px 0}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.25);transition:all .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);transform:scale(1.1)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,76px);gap:10px}
.pin-key{width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);color:var(--text);font-size:24px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .15s,transform .1s;-webkit-user-select:none;user-select:none;gap:2px}
.pin-key:active{background:rgba(255,255,255,.18);transform:scale(.93)}
.pin-key-sub{font-size:8px;letter-spacing:1px;color:var(--text3);font-family:'Mulish',sans-serif;font-weight:600;text-transform:uppercase}
.pin-key.del{font-size:20px;color:var(--text2)}
.pin-key.empty{background:none;border:none;cursor:default}
.pin-bio{width:56px;height:56px;border-radius:50%;background:rgba(201,170,124,.1);border:1px solid rgba(201,170,124,.3);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:background .2s}
.pin-bio:active{background:rgba(201,170,124,.25)}
.qty-sep{text-align:center;color:var(--text3);font-size:14px;font-weight:600}

.toast{position:fixed;top:calc(var(--top) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:300;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.install-banner{background:linear-gradient(135deg,rgba(201,170,124,.12),rgba(127,184,204,.08));border:1px solid rgba(201,170,124,.25);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.install-banner-text{flex:1;font-size:12px;color:var(--text2);line-height:1.4}
.install-banner-text strong{color:var(--gold);display:block;font-size:13px;margin-bottom:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.c-gold{color:var(--gold)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-red{color:var(--red)}
.stage-card-collapsed{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  margin-bottom:8px;overflow:hidden;cursor:pointer;
  transition:all .2s;animation:fadeUp .3s ease both;
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  -webkit-user-select:none;user-select:none;
}
.stage-card-collapsed:active{transform:scale(.98)}
.scc-icon{font-size:18px;flex-shrink:0}
.scc-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.scc-sum{font-family:'DM Mono',monospace;font-size:12px;color:var(--green);white-space:nowrap}

function setLang(l) {
  lang = l;

  ['langAZ','langRU','langEN'].forEach(id => {
    document.getElementById(id)?.classList.toggle('active', id === 'lang'+l.toUpperCase());

  updateDrawerLabels();
  renderDash();
  if(!document.getElementById('pageDetail').classList.contains('page-hidden-right')) renderDetail();
}

function updateDrawerLabels() {
  document.getElementById('drawerSub').textContent = t('myObjects');

  if(importLbl) importLbl.textContent = t('importJson');
  document.getElementById('dlObjects').textContent = t('objects');
  document.getElementById('drawerBtnAdd').innerHTML = t('newObject');
  document.getElementById('drawerFooterText').textContent = t('dataStored');
  ['langAZ','langRU','langEN'].forEach(id => {
    document.getElementById(id)?.classList.toggle('active', id === 'lang'+lang.toUpperCase());
  });
}

const fmt = n => {
  try{ return new Intl.NumberFormat('az-AZ',{style:'currency',currency:'AZN',maximumFractionDigits:0}).format(n); }
  catch{ return Math.round(n).toLocaleString()+' ₼'; }
};
const fmtShort = n => {
  const abs=Math.abs(n),s=n<0?'−':'';
  if(abs>=1e6) return s+(abs/1e6).toFixed(1).replace('.0','')+' млн ₼';
  return fmt(n);
};

const COLORS=['#C9AA7C','#7BB8CC','#CC7B7B','#9E8ED4','#80C89A','#C8C07E','#CC9B7B','#7BC4CC','#B87BB8','#7BA8CC'];

function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=(type==='ok'?'✓ ':type==='err'?'✕ ':'')+msg;
  el.className='toast show';clearTimeout(el._to);
  el._to=setTimeout(()=>{el.className='toast'},2400);
}

// ══════════════════════════
//  DRAWER

function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerBackdrop').classList.add('open');
  updateDrawerLabels();
  renderDrawer();
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerBackdrop').classList.remove('open');
}
function renderDrawer(){
  document.getElementById('drawerObjects').innerHTML=db.objects.map(o=>{
    const smeta=o.stages.reduce((a,s)=>a+s.items.reduce((b,i)=>b+itemTotal(i),0),0);
    const fact=o.stages.reduce((a,s)=>a+s.items.filter(i=>i.done).reduce((b,i)=>b+itemTotal(i),0),0);
    const pct=smeta>0?Math.round(fact/smeta*100):0;
    const isActive=o.id===db.activeObjectId;
    return `<div class="obj-item ${isActive?'active':''}" onclick="switchObject(${o.id})">
      <div class="obj-icon">${o.icon}</div>
      <div class="obj-info">
        <div class="obj-name">${tName(o)||o.name}</div>
        <div class="obj-meta">${o.stages.length} • ${pct}%</div>
      </div>
      ${isActive?'<div class="obj-active-dot"></div>':''}
      <button onclick="event.stopPropagation();editObjectPrompt(${o.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:4px;flex-shrink:0">✏️</button>
    </div>`;
  }).join('');
}
function switchObject(id){
  db.activeObjectId=id;activeStageId=null;saveDB();closeDrawer();
  document.getElementById('pageDash').classList.remove('page-hidden-left');
  document.getElementById('pageDetail').classList.add('page-hidden-right');
  renderDash();showToast(curObj().name);
}
function addObjectPrompt(){
  closeDrawer();window._objfd={name:'',icon:'🏠',budget:''};
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">${t('newObj')}</div>
    <div class="form-group"><label class="form-label">${t('objName')}</label>
      <input type="text" id="oName" placeholder="${t('objNamePh')}"/></div>
    <div class="form-group"><label class="form-label">${t('objBudget')}</label>
      <input type="number" id="oBudget" placeholder="200000"/></div>
    <div class="form-group"><label class="form-label">${t('objIcon')}</label>
      <div class="icon-grid">${OBJ_ICONS.map(ic=>`<div class="icon-opt ${ic==='🏠'?'sel':''}" onclick="selObjIcon('${ic}')">${ic}</div>`).join('')}</div></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="createObject()">${t('create')}</button>
    </div>`);
}
function editObjectPrompt(id){
  closeDrawer();const o=db.objects.find(x=>x.id===id);if(!o)return;
  window._objfd={id,name:o.name,icon:o.icon,budget:o.totalBudget||''};
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">${t('editObj')}</div>
    <div class="form-group"><label class="form-label">${t('objName')}</label>
      <input type="text" id="oName" value="${o.name}"/></div>
    <div class="form-group"><label class="form-label">${t('objBudget')}</label>
      <input type="number" id="oBudget" value="${o.totalBudget||''}"/></div>
    <div class="form-group"><label class="form-label">${t('objIcon')}</label>
      <div class="icon-grid">${OBJ_ICONS.map(ic=>`<div class="icon-opt ${ic===o.icon?'sel':''}" onclick="selObjIcon('${ic}')">${ic}</div>`).join('')}</div></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-danger btn-sm" onclick="deleteObjectConfirm(${id})">${t('delete')}</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveObject()">${t('save')}</button>
    </div>`);
}
function selObjIcon(ic){window._objfd.icon=ic;document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('sel',el.textContent===ic));}
function createObject(){
  const name=document.getElementById('oName')?.value.trim();
  const budget=parseInt(document.getElementById('oBudget')?.value)||0;
  if(!name){showToast(t('enterName'),'err');return;}
  const id=newId();
  db.objects.push({id,name,name_ru:name,name_az:name,name_en:name,icon:window._objfd.icon||'🏠',totalBudget:budget,stages:[]});
  db.activeObjectId=id;activeStageId=null;
  saveDB();closeModal();renderDash();showToast(t('objCreated'));
}
function saveObject(){
  const name=document.getElementById('oName')?.value.trim();
  const budget=parseInt(document.getElementById('oBudget')?.value)||0;
  if(!name){showToast(t('enterName'),'err');return;}
  const id=window._objfd.id;
  db.objects=db.objects.map(o=>o.id===id?{...o,name,name_ru:name,name_az:name,name_en:name,icon:window._objfd.icon||o.icon,totalBudget:budget}:o);
  saveDB();closeModal();renderDash();showToast(t('objUpdated'));
}
function deleteObjectConfirm(id){
  if(db.objects.length<=1){showToast(t('cantDeleteLast'),'err');return;}
  const o=db.objects.find(x=>x.id===id);closeModal();
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">${t('deleteObj')} «${o.name}»?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px">${t('deleteObjConfirm')}</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-danger" style="flex:1" onclick="deleteObject(${id})">${t('delete')}</button>
    </div>`);
}
function deleteObject(id){
  db.objects=db.objects.filter(o=>o.id!==id);
  if(db.activeObjectId===id)db.activeObjectId=db.objects[0].id;
  activeStageId=null;saveDB();closeModal();renderDash();showToast(t('objDeleted'));
}

function goDetail(id){

  document.getElementById('pageDetail').classList.remove('page-hidden-right');
  document.getElementById('pageDash').classList.add('page-hidden-left');
  document.getElementById('pageDetail').scrollTop=0;
}
function goBack(){
  document.getElementById('pageDash').classList.remove('page-hidden-left');
  document.getElementById('pageDetail').classList.add('page-hidden-right');
  renderDash();
}
// Swipe back on detail page
let txS=0,tyS=0,swD=null;
document.getElementById('pageDetail').addEventListener('touchstart',e=>{txS=e.touches[0].clientX;tyS=e.touches[0].clientY;swD=null;},{passive:true});
document.getElementById('pageDetail').addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-txS,dy=e.touches[0].clientY-tyS;
  if(!swD)swD=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(swD==='h'&&dx>0)document.getElementById('pageDetail').style.transform=`translateX(${Math.max(0,dx)}px)`;
},{passive:true});
document.getElementById('pageDetail').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-txS;
  document.getElementById('pageDetail').style.transform='';
  if(swD==='h'&&dx>80)goBack();
},{passive:true});

// Swipe left on drawer → close it
let drTxStart=0,drTyStart=0,drSwDir=null,drSwiping=false;
drawerEl.addEventListener('touchstart',e=>{
  drTxStart=e.touches[0].clientX;
  drTyStart=e.touches[0].clientY;
  drSwDir=null; drSwiping=false;
},{passive:true});
drawerEl.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-drTxStart;
  const dy=e.touches[0].clientY-drTyStart;
  if(!drSwDir) drSwDir=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(drSwDir==='h'&&dx<0){
    drSwiping=true;
    const offset=Math.max(0,285+dx);
    drawerEl.style.transition='none';
    drawerEl.style.transform=`translateX(calc(-100% + ${offset}px))`;
    backdropEl.style.transition='none';
    backdropEl.style.background=`rgba(0,0,0,${Math.min(offset/285*0.6,0.6)})`;
  }
},{passive:true});
drawerEl.addEventListener('touchend',e=>{
  if(!drSwiping) return;
  const dx=e.changedTouches[0].clientX-drTxStart;
  drawerEl.style.transition='';
  backdropEl.style.transition='';
  if(dx<-80){
    drawerEl.style.transform='';
    closeDrawer();
  } else {
    drawerEl.style.transform='';
    backdropEl.style.background='';
  }
  drSwiping=false;
},{passive:true});

// ══════════════════════════
//  RING SVG
// ══════════════════════════
function ringHTML(pct,color,size){
  const r=(size-7)/2,circ=2*Math.PI*r,dash=Math.min(pct,100)/100*circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="600">${Math.round(Math.min(pct,100))}%</text>
  </svg>`;
}

function renderDash(){
  const obj=curObj();
  const st=[...stages()].sort((a,b)=>{
    const o={idle:0,active:1,done:2};
    return (o[a.status||'idle']||0)-(o[b.status||'idle']||0);
  });
  const tb=totalBudget(), ts=totalSmeta(), tf=totalFact();
  const rem=tb-ts, isOver=ts>tb&&tb>0;
  const factOfSmeta=ts>0?Math.min(tf/ts*100,100):0;
  const smetaPct=tb>0?Math.min(ts/tb*100,100):0;

  document.getElementById('headerTitle').innerHTML=`${obj.icon} <span style="color:var(--gold)">${tName(obj)||obj.name}</span>`;
  document.getElementById('headerSub').textContent=`${st.length} ${lang==='en'?'stages':lang==='az'?'mərhələ':'этапов'}`;

  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  const showInstall=(!!window._installPrompt||isIOS)&&!isStandalone;

  document.getElementById('dashContent').innerHTML=`
    ${showInstall?`<div class="install-banner"><div style="font-size:26px">📲</div>
      <div class="install-banner-text"><strong>${t('install')}</strong>
        ${isIOS?t('installHint'):`<button class="btn btn-sm" style="background:rgba(201,170,124,.2);color:#C9AA7C;border:1px solid rgba(201,170,124,.3);margin-top:6px" onclick="installApp()">${t('installBtn')}</button>`}
      </div></div>`:''}

    <div class="budget-banner" style="animation-delay:.04s">
      <div class="bb-label">${t('totalBudget')}</div>
      <div class="bb-val">${tb>0?fmtShort(tb):t('budgetNotSet')}</div>
      <div class="bb-sub" style="margin-bottom:14px">${tb>0?(isOver?`<span style="color:var(--red)">${t('budgetOver')} +${fmtShort(ts-tb)}</span>`:`${t('budgetLeft')}: ${fmtShort(rem)}`):t('setBudget')}</div>
      <div class="bb-label">${t('smeta')}</div>
      <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--text);margin-bottom:12px">${fmtShort(ts)}</div>
      <div class="bb-label">${t('fact')}</div>
      <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--green);margin-bottom:12px">${fmtShort(tf)}</div>
      <div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;position:relative;margin-bottom:6px">
        <div style="position:absolute;inset:0;background:rgba(201,170,124,.3);border-radius:3px"></div>
        <div style="position:absolute;top:0;left:0;height:100%;width:${ts>0?Math.min(tf/ts*100,100):0}%;background:var(--green);border-radius:3px;transition:width .7s ease"></div>
      </div>
      <div style="font-size:11px;color:var(--text3)">${Math.round(factOfSmeta)}% ${t('pctDone')}</div>
    </div>

    <div class="section-divider"></div>
    <div class="section-title">${t('stages')}</div>

    ${st.map((s,i)=>{
      const smeta=stageSmeta(s),fact=stageFact(s);
      const fp=smeta>0?Math.min(fact/smeta*100,100):0;
      const done=s.items.filter(i=>i.done).length;
      const over=fact>smeta&&smeta>0;
      if(s.status==='done') return `<div class="stage-card-collapsed" style="animation-delay:${.12+i*.07}s;border-left:3px solid ${s.color}" onclick="goDetail(${s.id})">
        <div class="scc-check"><svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#80C89A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="scc-icon">${s.icon}</div>
        <div class="scc-name">${tName(s)}</div>
        <div class="scc-sum">${fmtShort(fact)}</div>
        <div style="font-size:11px;color:var(--green);margin-left:2px">✓</div>
      </div>`;

      return `<div class="stage-card" style="animation-delay:${.12+i*.07}s" onclick="goDetail(${s.id})">
        <div class="stage-card-accent" style="background:linear-gradient(90deg,${s.color},transparent)"></div>
        <div class="stage-card-body">

          <div class="stage-card-icon">${s.icon}</div>
          <div class="stage-card-info">
            <div class="stage-card-name">${tName(s)}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:${s.contractor||s.startDate||s.endDate?'3':'0'}px">
              <div class="stage-card-meta">${s.items.length>0?`${done}/${s.items.length}`:''}</div>
              ${s.items.length>0?`<div style="flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;max-width:60px">
                <div style="height:100%;width:${s.items.length>0?Math.round(done/s.items.length*100):0}%;background:${s.color};border-radius:2px"></div>
              </div>`:''}
            </div>
            ${s.contractor?`<div style="font-size:11px;color:var(--text2);margin-top:4px">👤 ${s.contractor}</div>`:''}
            ${(s.startDate||s.endDate)?`<div style="font-size:11px;color:var(--text2);margin-top:2px">📅 ${s.startDate||'?'}${s.endDate?' → '+s.endDate:''}</div>`:''}
          </div>
          <div>${ringHTML(fp,s.color,54)}</div>
        </div>
        <div class="stage-card-bar-track">
          <div class="scb-smeta" style="width:100%;background:${s.color}"></div>
          <div class="scb-fact" style="width:${fp}%;background:${s.color}"></div>
        </div>
        <div class="stage-card-stats">
          <div class="scs-item"><div class="scs-label">${t('smetaLabel')}</div><div class="scs-val c-gold">${fmtShort(smeta)}</div></div>
          <div class="scs-item"><div class="scs-label">${t('factShort')}</div><div class="scs-val c-green">${fmtShort(fact)}</div></div>
          <div class="scs-item"><div class="scs-label">${t('remainder')}</div><div class="scs-val ${over?'c-red':'c-blue'}">${fmtShort(smeta-fact)}</div></div>
        </div>
      </div>`;
    }).join('')}
    ${st.length===0?`<div class="empty"><div style="font-size:48px;opacity:.3;margin-bottom:12px">🏗</div><div style="font-size:14px">${t('noStages')}</div></div>`:''}
  `;
}

function renderDetail(){

        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polyline points="11,4 6,9 11,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

      <div>${ringHTML(fp,s.color,64)}</div>
    </div>
    <div class="detail-two-bar">
      <div class="dtb-smeta" style="width:100%;background:${s.color}"></div>

function updateStages(fn){
  db.objects=db.objects.map(o=>o.id===db.activeObjectId?{...o,stages:fn(o.stages)}:o);
  saveDB();
}
function toggleItem(stageId,itemId){
  updateStages(ss=>ss.map(s=>{
    if(s.id!==stageId)return s;
    const items=s.items.map(i=>i.id===itemId?{...i,done:!i.done}:i);
    const allDone=items.length>0&&items.every(i=>i.done);
    const anyDone=items.some(i=>i.done);
    const status=allDone?'done':anyDone?'active':'idle';
    return{...s,items,status};
  }));
  renderDetail();
  renderDash();
}
function deleteItem(stageId,itemId){
  updateStages(ss=>ss.map(s=>s.id!==stageId?s:{...s,items:s.items.filter(i=>i.id!==itemId)}));
  renderDetail();showToast(t('deletePos'));
}
function addItem(stageId){
  const name=document.getElementById('newItemName')?.value.trim();
  const qty=parseInt(document.getElementById('newItemQty')?.value)||1;
  const price=parseFloat(document.getElementById('newItemPrice')?.value);
  const note=document.getElementById('newItemNote')?.value.trim()||'';
  if(!name){showToast(t('enterName'),'err');return;}
  if(!price||price<=0){showToast(t('enterBudget'),'err');return;}
  updateStages(ss=>ss.map(s=>s.id!==stageId?s:{...s,items:[...s.items,{id:newId(),name,qty,price,done:false,note}]}));
  renderDetail();showToast(t('posAdded'));
}

function saveStage(editId){
  const name=document.getElementById('sName')?.value.trim();
  const icon=window._sfd?.icon||'🏠',color=window._sfd?.color||'#7BB8CC';
  if(!name){showToast(t('enterName'),'err');return;}
  const contractor=document.getElementById('sContractor')?.value.trim()||'';
  const startDate=document.getElementById('sStartDate')?.value||'';
  const endDate=document.getElementById('sEndDate')?.value||'';
  if(editId){

    updateStages(ss=>ss.map(s=>s.id===id?{...s,name,icon,color,contractor,startDate,endDate}:s));
    showToast(t('stageUpdated'));
  } else {
    updateStages(ss=>[...ss,{id:newId(),name,icon,color,contractor,startDate,endDate,status:'idle',items:[]}]);

  closeModal();

function showModal(html){

function triggerImport(){
  document.getElementById('importFile').click();
}
function handleImport(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      // Support both full DB and single object array
      if(data.objects && data.activeObjectId){
        db=data; saveDB(); renderDash(); showToast(t('importSuccess'));
      } else if(Array.isArray(data)){
        // Legacy: array of stages
        const id=newId();
        db.objects.push({id,name:'Импорт',icon:'📥',totalBudget:0,stages:data});
        db.activeObjectId=id; saveDB(); renderDash(); showToast(t('importSuccess'));
      } else { showToast(t('importError'),'err'); }
    }catch{ showToast(t('importError'),'err'); }
  };
  reader.readAsText(file);
  e.target.value='';
}


// DRUM DATE PICKER
const MONTHS_RU=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MONTHS_EN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_AZ=['Yan','Fev','Mar','Apr','May','İyn','İyl','Avq','Sen','Okt','Noy','Dek'];
const getMonths=()=>lang==='en'?MONTHS_EN:lang==='az'?MONTHS_AZ:MONTHS_RU;
let _drum={field:null,day:1,month:1,year:new Date().getFullYear()};

function openDrumPicker(field, currentVal){
  const now=new Date();
  _drum.field=field;
  if(currentVal && currentVal.length===10){
    const p=currentVal.split('-').map(Number);
    _drum.day=p[2];_drum.month=p[1];_drum.year=p[0];
  } else {
    _drum.day=now.getDate();_drum.month=now.getMonth()+1;_drum.year=now.getFullYear();
  }
  const days=Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0'));
  const months=getMonths();
  const years=Array.from({length:8},(_,i)=>String(now.getFullYear()+i));
  const clearLabel=lang==='en'?'Clear':lang==='az'?'Sil':'Очистить';

  const dayLabel=lang==='en'?'Day':lang==='az'?'Gün':'День';
  const monLabel=lang==='en'?'Month':lang==='az'?'Ay':'Месяц';
  const yrLabel=lang==='en'?'Year':lang==='az'?'İl':'Год';
  showModal('<div class="modal-handle"></div>'
    +'<div class="modal-title">'+(field==='start'?t('startDate'):t('endDate'))+'</div>'
    +'<div class="drum-picker">'

const PIN_KEY = 'tikinti_pin';
const PIN_BIO = 'tikinti_bio';
let _pinMode = null, _pinEntered = '', _pinTarget = '';

const KEYPAD = [
  {n:'1',s:''},    {n:'2',s:'ABC'}, {n:'3',s:'DEF'},
  {n:'4',s:'GHI'}, {n:'5',s:'JKL'}, {n:'6',s:'MNO'},
  {n:'7',s:'PQRS'},{n:'8',s:'TUV'}, {n:'9',s:'WXYZ'},
  null,            {n:'0',s:'+'},   'del'
];

function pinLabel(mode){
  if(mode==='enter') return lang==='en'?'Enter PIN':lang==='az'?'PIN daxil edin':'Введите PIN';
  if(mode==='set')   return lang==='en'?'Set new PIN':lang==='az'?'Yeni PIN təyin edin':'Задайте PIN';
  return lang==='en'?'Confirm PIN':lang==='az'?'PIN təsdiqləyin':'Подтвердите PIN';
}

async function checkBiometric(){
  if(!window.PublicKeyCredential) return false;
  try {
    const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    return ok;
  } catch { return false; }
}

async function tryBiometric(){
  try {
    // Use WebAuthn to verify
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    // Simplified: use credentials.get if registered, else fallback
    if(localStorage.getItem(PIN_BIO+'_cred')){
      // Already registered - try silent auth via platform authenticator
      showToast(lang==='en'?'Verifying...':lang==='az'?'Yoxlanılır...':'Проверка...');
      // For PWA we use simpler approach - check if biometric available
      const available = await checkBiometric();
      if(available){
        document.getElementById('pinOverlay')?.remove();
        return true;
      }
    }
    return false;
  } catch { return false; }
}

function showPinOverlay(mode, onSuccess){
  _pinMode = mode; _pinEntered = ''; _pinTarget = '';

  const hasBio = localStorage.getItem(PIN_BIO) === '1';
  const bioAvailable = 'PublicKeyCredential' in window;

  const overlay = document.createElement('div');
  overlay.className = 'pin-overlay'; overlay.id = 'pinOverlay';

  // Build keypad HTML
  let padHTML = '';
  KEYPAD.forEach(k => {
    if(!k){ padHTML += '<button class="pin-key empty"></button>'; return; }
    if(k==='del'){ padHTML += '<button class="pin-key del" onclick="pinDel()">⌫</button>'; return; }
    padHTML += '<button class="pin-key" onclick="pinKey(\'' + k.n + '\')">'
      + '<span>' + k.n + '</span>'
      + (k.s ? '<span class="pin-key-sub">' + k.s + '</span>' : '')
      + '</button>';
  });

  let html = '<div class="pin-logo">🏡 Tikinti</div>'
    + '<div class="pin-subtitle">' + pinLabel(mode) + '</div>'
    + '<div class="pin-dots" id="pinDots">'
    + '<div class="pin-dot" id="pd0"></div>'
    + '<div class="pin-dot" id="pd1"></div>'
    + '<div class="pin-dot" id="pd2"></div>'
    + '<div class="pin-dot" id="pd3"></div>'
    + '</div>'
    + '<div class="pin-pad">' + padHTML + '</div>';

  if(mode === 'enter' && hasBio && bioAvailable){
    const bioTitle = lang==='en'?'Use fingerprint':lang==='az'?'Barmaq izi':'Отпечаток пальца';
    html += '<button class="pin-bio" onclick="biometricAuth()" title="' + bioTitle + '">🫆</button>';
  }
  if(mode === 'enter'){
    const cancelLabel = lang==='en'?'Cancel':lang==='az'?'Ləğv et':'Отмена';
    html += '<button style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:Mulish,sans-serif;margin-top:4px" onclick="document.getElementById('pinOverlay').remove()">' + cancelLabel + '</button>';
  }

  overlay.innerHTML = html;
  overlay._onSuccess = onSuccess;
  document.body.appendChild(overlay);

  if(mode === 'enter' && hasBio && bioAvailable){
    setTimeout(() => biometricAuth(), 400);
  }
}


async function biometricAuth(){
  if(!('credentials' in navigator)) return;
  try {
    // Use platform authenticator (Face ID / Touch ID / fingerprint)
    const credential = await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rpId: location.hostname,
        userVerification: 'required',
        allowCredentials: [],
        timeout: 30000
      }
    });
    if(credential){
      const overlay = document.getElementById('pinOverlay');
      const cb = overlay?._onSuccess;
      overlay?.remove();
      if(cb) cb();
      showToast(lang==='en'?'Authenticated':lang==='az'?'Təsdiqləndi':'Подтверждено ✓');
    }
  } catch(e){
    // Biometric failed or cancelled - let user use PIN
    console.log('Bio failed:', e.name);
  }
}

function pinKey(n){
  if(_pinEntered.length >= 4) return;
  _pinEntered += n;
  updatePinDots();
  if(_pinEntered.length === 4) setTimeout(processPinInput, 150);
}

function pinDel(){
  if(!_pinEntered.length) return;
  _pinEntered = _pinEntered.slice(0,-1);
  updatePinDots();
}

function updatePinDots(error){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(!d) continue;
    d.classList.toggle('filled', !error && i < _pinEntered.length);
    d.classList.toggle('error', !!error);
  }
}

function processPinInput(){
  const stored = localStorage.getItem(PIN_KEY);
  if(_pinMode === 'enter'){
    if(_pinEntered === stored){
      const overlay = document.getElementById('pinOverlay');
      const cb = overlay?._onSuccess;
      overlay?.remove();
      if(cb) cb();
    } else {
      updatePinDots(true);
      setTimeout(()=>{ _pinEntered=''; updatePinDots(); }, 600);
      if(navigator.vibrate) navigator.vibrate([50,30,50]);
      showToast(lang==='en'?'Wrong PIN':lang==='az'?'Yanlış PIN':'Неверный PIN','err');
    }
  } else if(_pinMode === 'set'){
    _pinTarget = _pinEntered; _pinEntered = '';
    updatePinDots();
    // Change subtitle
    const sub = document.querySelector('.pin-subtitle');
    if(sub) sub.textContent = pinLabel('confirm');
    _pinMode = 'confirm';
  } else if(_pinMode === 'confirm'){
    if(_pinEntered === _pinTarget){
      localStorage.setItem(PIN_KEY, _pinEntered);
      document.getElementById('pinOverlay')?.remove();
      // Ask about biometric
      askBiometric();
      showToast(lang==='en'?'PIN set ✓':lang==='az'?'PIN təyin edildi ✓':'PIN установлен ✓');
    } else {
      updatePinDots(true);
      setTimeout(()=>{ _pinEntered=''; _pinTarget=''; _pinMode='set'; updatePinDots();
        const sub=document.querySelector('.pin-subtitle'); if(sub) sub.textContent=pinLabel('set');
      }, 600);
      showToast(lang==='en'?'PINs don't match':lang==='az'?'PIN uyğun deyil':'PIN не совпадает','err');
    }
  }
}

  const avail = await checkBiometric();

  const msg = lang==='en'?'Enable fingerprint/Face ID?':lang==='az'?'Barmaq izi aktivləşdirilsin?':'Включить отпечаток пальца?';

      }).join('')}
    </div>
    ${mode==='enter' && hasBio && bioAvailable ? `
      <button class="pin-bio" onclick="biometricAuth()" title="${lang==='en'?'Use fingerprint':lang==='az'?'Barmaq izi':'Отпечаток пальца'}">
        🫆
      </button>` : ''}
    ${mode==='enter' ? `
      <button style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Mulish',sans-serif;margin-top:4px" onclick="document.getElementById('pinOverlay').remove()">
        ${lang==='en'?'Cancel':lang==='az'?'Ləğv et':'Отмена'}
      </button>` : ''}
  `;
  overlay._onSuccess = onSuccess;
  document.body.appendChild(overlay);

  // Auto-trigger biometric on enter mode
  if(mode==='enter' && hasBio && bioAvailable){
    setTimeout(()=>biometricAuth(), 400);
  }
}

async function biometricAuth(){
  if(!('credentials' in navigator)) return;
  try {
    // Use platform authenticator (Face ID / Touch ID / fingerprint)
    const credential = await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rpId: location.hostname,
        userVerification: 'required',
        allowCredentials: [],
        timeout: 30000
      }
    });
    if(credential){
      const overlay = document.getElementById('pinOverlay');
      const cb = overlay?._onSuccess;
      overlay?.remove();
      if(cb) cb();
      showToast(lang==='en'?'Authenticated':lang==='az'?'Təsdiqləndi':'Подтверждено ✓');
    }
  } catch(e){
    // Biometric failed or cancelled - let user use PIN
    console.log('Bio failed:', e.name);
  }
}

function pinKey(n){
  if(_pinEntered.length >= 4) return;
  _pinEntered += n;
  updatePinDots();
  if(_pinEntered.length === 4) setTimeout(processPinInput, 150);
}

function pinDel(){
  if(!_pinEntered.length) return;
  _pinEntered = _pinEntered.slice(0,-1);
  updatePinDots();
}

function updatePinDots(error){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(!d) continue;
    d.classList.toggle('filled', !error && i < _pinEntered.length);
    d.classList.toggle('error', !!error);
  }
}

function processPinInput(){
  const stored = localStorage.getItem(PIN_KEY);
  if(_pinMode === 'enter'){
    if(_pinEntered === stored){
      const overlay = document.getElementById('pinOverlay');
      const cb = overlay?._onSuccess;
      overlay?.remove();
      if(cb) cb();
    } else {
      updatePinDots(true);
      setTimeout(()=>{ _pinEntered=''; updatePinDots(); }, 600);
      if(navigator.vibrate) navigator.vibrate([50,30,50]);
      showToast(lang==='en'?'Wrong PIN':lang==='az'?'Yanlış PIN':'Неверный PIN','err');
    }
  } else if(_pinMode === 'set'){
    _pinTarget = _pinEntered; _pinEntered = '';
    updatePinDots();
    // Change subtitle
    const sub = document.querySelector('.pin-subtitle');
    if(sub) sub.textContent = pinLabel('confirm');
    _pinMode = 'confirm';
  } else if(_pinMode === 'confirm'){
    if(_pinEntered === _pinTarget){
      localStorage.setItem(PIN_KEY, _pinEntered);
      document.getElementById('pinOverlay')?.remove();
      // Ask about biometric
      askBiometric();
      showToast(lang==='en'?'PIN set ✓':lang==='az'?'PIN təyin edildi ✓':'PIN установлен ✓');
    } else {
      updatePinDots(true);
      setTimeout(()=>{ _pinEntered=''; _pinTarget=''; _pinMode='set'; updatePinDots();
        const sub=document.querySelector('.pin-subtitle'); if(sub) sub.textContent=pinLabel('set');
      }, 600);
      showToast(lang==='en'?'PINs don't match':lang==='az'?'PIN uyğun deyil':'PIN не совпадает','err');
    }
  }
}

async function askBiometric(){
  const avail = await checkBiometric();
  if(!avail) return;
  const msg = lang==='en'?'Enable fingerprint/Face ID?':lang==='az'?'Barmaq izi aktivləşdirilsin?':'Включить отпечаток пальца?';
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title" style="font-size:14px">${msg}</div>
    <div style="font-size:32px;text-align:center;margin:10px 0">🫆</div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">${lang==='en'?'Skip':lang==='az'?'Keç':'Пропустить'}</button>
      <button class="btn btn-primary" onclick="enableBiometric()">${lang==='en'?'Enable':lang==='az'?'Aktiv et':'Включить'}</button>
    </div>`);
}

async function enableBiometric(){
  closeModal();
  localStorage.setItem(PIN_BIO, '1');
  showToast(lang==='en'?'Fingerprint enabled':lang==='az'?'Barmaq izi aktivləşdirildi':'Отпечаток включён ✓');
}

function checkPin(){
  const pin = localStorage.getItem(PIN_KEY);
  if(!pin) return;
  // Hide app content while PIN shown
  document.getElementById('pageDash').style.visibility='hidden';
  showPinOverlay('enter', ()=>{
    document.getElementById('pageDash').style.visibility='';
  });
}

function pinSettings(){
  const hasPin = !!localStorage.getItem(PIN_KEY);
  const hasBio = localStorage.getItem(PIN_BIO)==='1';
  const setLabel = hasPin?(lang==='en'?'Change PIN':lang==='az'?'PIN dəyiş':'Изменить PIN'):(lang==='en'?'Set PIN':lang==='az'?'PIN təyin et':'Задать PIN');
  const removeLabel = lang==='en'?'Remove PIN':lang==='az'?'PIN sil':'Удалить PIN';
  const bioLabel = hasBio?(lang==='en'?'Disable fingerprint':lang==='az'?'Barmaq izi söndür':'Отключить отпечаток'):(lang==='en'?'Enable fingerprint':lang==='az'?'Barmaq izi aktiv et':'Включить отпечаток');
  const bioVal = hasBio?'0':'1';
  const doneMsg = lang==='en'?'Done':lang==='az'?'Tamam':'Готово';
  let html = '<div class="modal-handle"></div><div class="modal-title">🔐 PIN</div><div style="display:flex;flex-direction:column;gap:10px">';
  html += '<button class="btn btn-secondary" onclick="closeModal();showPinOverlay('set')">' + setLabel + '</button>';
  if(hasPin) html += '<button class="btn btn-secondary" onclick="closeModal();confirmRemovePin()">' + removeLabel + '</button>';
  if(hasPin) html += '<button class="btn btn-secondary" onclick="localStorage.setItem(''+PIN_BIO+'',''+bioVal+'');closeModal();showToast(''+doneMsg+'')">' + bioLabel + '</button>';
  html += '</div>';
  showModal(html);
}

function confirmRemovePin(){
  const title = lang==='en'?'Remove PIN?':lang==='az'?'PIN silinsin?':'Удалить PIN?';
  const cancel = lang==='en'?'Cancel':lang==='az'?'Ləğv et':'Отмена';
  const remove = lang==='en'?'Remove':lang==='az'?'Sil':'Удалить';
  const removed = lang==='en'?'PIN removed':lang==='az'?'PIN silindi':'PIN удалён';
  showModal('<div class="modal-handle"></div>'
    +'<div class="modal-title">'+title+'</div>'
    +'<div style="display:flex;gap:10px;margin-top:4px">'
      +'<button class="btn btn-secondary" onclick="closeModal()">'+cancel+'</button>'
      +'<button class="btn btn-danger" style="flex:1" onclick="localStorage.removeItem(''+PIN_KEY+'');localStorage.removeItem(''+PIN_BIO+'');closeModal();showToast(''+removed+'')">'+remove+'</button>'
    +'</div>');
}

window._installPrompt=null;renderDash();});
}

document.getElementById('btnAdd').onclick=()=>showStageModal(null);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

// Swipe right on dashboard → open drawer
let dashTxStart=0, dashTyStart=0, dashSwDir=null, dashSwiping=false;
const dashPage = document.getElementById('pageDash');
dashPage.addEventListener('touchstart', e=>{
  if(drawerEl.classList.contains('open')) return;
  dashTxStart=e.touches[0].clientX;
  dashTyStart=e.touches[0].clientY;
  dashSwDir=null;
  dashSwiping=false;
},{passive:true});

dashPage.addEventListener('touchmove', e=>{
  if(drawerEl.classList.contains('open')) return;
  const dx=e.touches[0].clientX-dashTxStart;
  const dy=e.touches[0].clientY-dashTyStart;
  if(!dashSwDir) dashSwDir=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(dashSwDir==='h' && dx>0){
    dashSwiping=true;
    const offset=Math.min(dx, 285);
    drawerEl.style.transition='none';
    drawerEl.style.transform=`translateX(calc(-100% + ${offset}px))`;
    backdropEl.style.transition='none';
    backdropEl.style.background=`rgba(0,0,0,${Math.min(offset/285*0.6,0.6)})`;
    backdropEl.style.pointerEvents='all';
  }
},{passive:true});

dashPage.addEventListener('touchend', e=>{
  if(!dashSwiping) return;
  const dx=e.changedTouches[0].clientX-dashTxStart;
  // restore transitions
  drawerEl.style.transition='';
  backdropEl.style.transition='';
  if(dx>80){
    // fully open
    drawerEl.style.transform='';
    drawerEl.classList.add('open');
    backdropEl.style.background='';
    backdropEl.classList.add('open');
    backdropEl.style.pointerEvents='';
    renderDrawer();
    updateDrawerLabels();
  } else {
    // snap back
    drawerEl.style.transform='';
    backdropEl.style.background='';
    backdropEl.style.pointerEvents='';
  }
  dashSwiping=false;
},{passive:true});

updateDrawerLabels();
renderDash();
checkPin();

// Handle PWA shortcuts
const urlParams = new URLSearchParams(window.location.search);
const action = urlParams.get('action');
if(action === 'addStage') setTimeout(()=>showStageModal(null), 400);
if(action === 'addObject') setTimeout(()=>addObjectPrompt(), 400);
</script>
