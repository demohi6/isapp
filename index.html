<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Строим 🏡"/>
<meta name="theme-color" content="#0D0F14"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230D0F14'/><text y='130' x='90' font-size='100' text-anchor='middle'>🏡</text></svg>"/>
<title>Строим Дом</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Mulish:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0F14;--bg2:#13161C;--bg3:#1A1E27;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#EAE6DE;--text2:rgba(234,230,222,0.55);--text3:rgba(234,230,222,0.28);
  --gold:#C9AA7C;--blue:#7BB8CC;--green:#80C89A;--red:#CC7B7B;
  --safe:env(safe-area-inset-bottom,0px);
  --top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;overflow:hidden}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;overflow:hidden}

/* ── PAGES ── */
.page{
  position:absolute;inset:0;
  background:var(--bg);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s ease;
  will-change:transform;
}
.page::-webkit-scrollbar{display:none}
.page.page-hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.page.page-hidden-left{transform:translateX(-30%);opacity:0;pointer-events:none}

/* ── HEADER ── */
.header{
  padding:calc(var(--top) + 16px) 16px 14px;
  background:var(--bg);
  position:sticky;top:0;z-index:10;
}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.5px}
.logo span{color:var(--gold)}
.back-btn{
  display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:600;color:var(--gold);
  background:none;border:none;cursor:pointer;padding:4px 0;
  font-family:'Mulish',sans-serif;
}
.back-btn svg{transition:transform .2s}
.back-btn:active svg{transform:translateX(-3px)}

/* ── SCROLL CONTENT ── */
.content{padding:16px 16px calc(32px + var(--safe))}

/* ── SUMMARY STRIP ── */
.summary-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sum-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:14px 14px;
  animation:fadeUp .4s ease both;
}
.sum-card.full{grid-column:1/-1}
.sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.sum-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:600;line-height:1}
.sum-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ── PROGRESS ── */
.prog-bar-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:10px}
.prog-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--green));transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ── SECTION TITLE ── */
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px;margin-top:4px}

/* ── STAGE CARD ── */
.stage-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:18px;margin-bottom:10px;overflow:hidden;
  cursor:pointer;
  transition:transform .18s,box-shadow .18s;
  animation:fadeUp .4s ease both;
  position:relative;
}
.stage-card:active{transform:scale(.97)}
.stage-card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.stage-card-body{padding:16px 16px 14px;display:flex;align-items:center;gap:14px}
.stage-card-icon{font-size:28px;flex-shrink:0}
.stage-card-info{flex:1;min-width:0}
.stage-card-name{font-weight:700;font-size:15px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-card-meta{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.stage-card-ring{flex-shrink:0}
.stage-card-bar{height:3px;background:rgba(255,255,255,.05);margin:0 16px 14px;border-radius:2px;overflow:hidden}
.stage-card-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.stage-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.scs-item{background:var(--bg2);padding:10px 14px}
.scs-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.scs-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}

/* ── STAGE DETAIL PAGE ── */
.detail-hero{
  padding:calc(var(--top) + 16px) 16px 0;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;
}
.detail-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.detail-hero-left{flex:1;min-width:0}
.detail-hero-icon{font-size:32px;margin-bottom:6px}
.detail-hero-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.detail-hero-budget{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3)}
.detail-hero-prog{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin:10px 0 0}
.detail-hero-prog-fill{height:100%;border-radius:2px;transition:width .6s}

/* ── ITEMS ── */
.items-section{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:12px}
.items-header{padding:10px 16px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:32px 1fr auto 32px;gap:8px;align-items:center}
.item-row{
  display:grid;grid-template-columns:32px 1fr auto 32px;
  align-items:center;gap:8px;padding:11px 16px;
  border-bottom:1px solid var(--border);
  transition:background .15s;
  animation:itemIn .25s ease both;
}
.item-row:last-child{border-bottom:none}
@keyframes itemIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.item-check{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(255,255,255,.2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.item-check.done{border-color:transparent}
.item-name{font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .2s,text-decoration .2s}
.item-name.done{text-decoration:line-through;color:var(--text3)}
.item-cost{font-family:'DM Mono',monospace;font-size:12px;white-space:nowrap;color:var(--text2)}
.item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .2s}
.item-del:active{background:rgba(204,123,123,.2);color:var(--red)}

/* ── ADD FORM ── */
.add-form{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:14px 16px;margin-bottom:12px}
.add-form-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.add-form-row{display:flex;gap:8px;margin-top:8px}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}

/* ── INPUTS ── */
input[type=text],input[type=number]{
  background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);
  border-radius:10px;padding:10px 12px;font-family:'Mulish',sans-serif;font-size:14px;
  outline:none;width:100%;transition:border-color .2s;-webkit-appearance:none;
}
input:focus{border-color:rgba(255,255,255,.3)}

/* ── BUTTONS ── */
.btn{cursor:pointer;border:none;border-radius:12px;font-family:'Mulish',sans-serif;font-weight:600;
  font-size:14px;padding:12px 16px;transition:transform .15s,opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  -webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:#0D0F14;width:100%}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text2);flex:1}
.btn-danger{background:rgba(204,123,123,.15);color:var(--red)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn-icon{padding:10px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--border)}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:24px 20px calc(24px + var(--safe));max-height:92vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px}
.icon-opt{width:42px;height:42px;border-radius:10px;border:1.5px solid transparent;background:rgba(255,255,255,.05);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-opt.sel{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.color-opt.sel{border-color:white;transform:scale(1.15)}

/* ── TOAST ── */
.toast{position:fixed;top:calc(var(--top) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:600;z-index:300;
  transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.c-gold{color:var(--gold)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-red{color:var(--red)}

/* ── INSTALL ── */
.install-banner{background:linear-gradient(135deg,rgba(201,170,124,.12),rgba(127,184,204,.08));border:1px solid rgba(201,170,124,.25);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.install-banner-text{flex:1;font-size:12px;color:var(--text2);line-height:1.4}
.install-banner-text strong{color:var(--gold);display:block;font-size:13px;margin-bottom:2px}
</style>
</head>
<body>
<div id="app">
  <!-- DASHBOARD PAGE -->
  <div class="page" id="pageDash">
    <div class="header">
      <div class="header-row">
        <div class="logo">Строим <span>Дом</span> 🏡</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-icon" id="btnExport" style="font-size:16px">💾</button>
          <button class="btn btn-icon" id="btnAdd" style="font-size:18px">＋</button>
        </div>
      </div>
    </div>
    <div class="content" id="dashContent"></div>
  </div>

  <!-- STAGE DETAIL PAGE -->
  <div class="page page-hidden-right" id="pageDetail">
    <div class="detail-hero" id="detailHero"></div>
    <div class="content" id="detailContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════
//  FORMAT — Манат
// ══════════════════════════
const fmt = n => new Intl.NumberFormat('az-AZ',{style:'currency',currency:'AZN',maximumFractionDigits:0}).format(n);
const fmtShort = n => {
  const abs=Math.abs(n), s=n<0?'−':'';
  if(abs>=1e6) return s+(abs/1e6).toFixed(1).replace('.0','')+' млн ₼';
  if(abs>=1e3) return s+(abs/1e3).toFixed(0)+' тыс ₼';
  return fmt(n);
};

// ══════════════════════════
//  DATA
// ══════════════════════════
const STORE_KEY='isapp_v3';
const DEFAULT_STAGES=[
  {id:1,name:"Фундамент",icon:"⬛",color:"#C9AA7C",budget:850000,items:[
    {id:1,name:"Земляные работы",cost:120000,done:true},
    {id:2,name:"Арматура и опалубка",cost:180000,done:true},
    {id:3,name:"Бетон",cost:220000,done:true},
    {id:4,name:"Гидроизоляция",cost:100000,done:false},
    {id:5,name:"Засыпка пазух",cost:80000,done:false},
  ]},
  {id:2,name:"Коробка дома",icon:"🏗",color:"#7BB8CC",budget:2400000,items:[
    {id:1,name:"Кладка 1 этаж",cost:480000,done:true},
    {id:2,name:"Перекрытие",cost:320000,done:true},
    {id:3,name:"Кладка 2 этаж",cost:480000,done:false},
    {id:4,name:"Фронтоны",cost:120000,done:false},
    {id:5,name:"Стропила",cost:280000,done:false},
  ]},
  {id:3,name:"Кровля",icon:"🏠",color:"#CC7B7B",budget:680000,items:[
    {id:1,name:"Утеплитель",cost:120000,done:false},
    {id:2,name:"Кровельный материал",cost:320000,done:false},
    {id:3,name:"Водосток",cost:85000,done:false},
    {id:4,name:"Доборные элементы",cost:55000,done:false},
  ]},
  {id:4,name:"Окна и двери",icon:"🪟",color:"#9E8ED4",budget:520000,items:[
    {id:1,name:"Окна ПВХ",cost:280000,done:false},
    {id:2,name:"Входная дверь",cost:85000,done:false},
    {id:3,name:"Межкомнатные двери",cost:120000,done:false},
    {id:4,name:"Монтаж",cost:35000,done:false},
  ]},
  {id:5,name:"Инженерия",icon:"⚙️",color:"#80C89A",budget:980000,items:[
    {id:1,name:"Электрика",cost:280000,done:false},
    {id:2,name:"Водоснабжение",cost:180000,done:false},
    {id:3,name:"Канализация",cost:150000,done:false},
    {id:4,name:"Отопление",cost:320000,done:false},
  ]},
  {id:6,name:"Отделка",icon:"🎨",color:"#C8C07E",budget:1200000,items:[
    {id:1,name:"Стяжка полов",cost:180000,done:false},
    {id:2,name:"Штукатурка",cost:240000,done:false},
    {id:3,name:"Плитка",cost:120000,done:false},
    {id:4,name:"Покраска",cost:160000,done:false},
    {id:5,name:"Ламинат",cost:220000,done:false},
  ]},
];

function load(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||DEFAULT_STAGES}catch{return DEFAULT_STAGES}}
function save(s){localStorage.setItem(STORE_KEY,JSON.stringify(s))}

let stages=load();
let activeStageId=null;

const stageSpent  =s=>s.items.filter(i=>i.done).reduce((a,b)=>a+b.cost,0);
const stagePlanned=s=>s.items.reduce((a,b)=>a+b.cost,0);
const totalBudget =()=>stages.reduce((a,s)=>a+s.budget,0);
const totalSpent  =()=>stages.reduce((a,s)=>a+stageSpent(s),0);
const newId=()=>Date.now()+Math.floor(Math.random()*999);
const ICONS=['🏠','🏗','⬛','🪟','⚙️','🎨','🌿','🧱','🔧','💡','🚿','🛠','🏡','🌲','🪣','🔑','🏊','🌳'];
const COLORS=['#C9AA7C','#7BB8CC','#CC7B7B','#9E8ED4','#80C89A','#C8C07E','#CC9B7B','#7BC4CC','#B87BB8','#7BA8CC'];

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=(type==='ok'?'✓ ':type==='err'?'✕ ':'')+msg;
  t.className='toast show';clearTimeout(t._to);
  t._to=setTimeout(()=>{t.className='toast'},2200);
}

// ══════════════════════════
//  NAVIGATION
// ══════════════════════════
function goDetail(id){
  activeStageId=id;
  renderDetail();
  const dash=document.getElementById('pageDash');
  const detail=document.getElementById('pageDetail');
  detail.classList.remove('page-hidden-right');
  dash.classList.add('page-hidden-left');
  detail.scrollTop=0;
}

function goBack(){
  const dash=document.getElementById('pageDash');
  const detail=document.getElementById('pageDetail');
  dash.classList.remove('page-hidden-left');
  detail.classList.add('page-hidden-right');
  renderDash(); // refresh counts
}

// Swipe back (detail → dash)
let txStart=0,tyStart=0,swDir=null;
document.getElementById('pageDetail').addEventListener('touchstart',e=>{
  txStart=e.touches[0].clientX;tyStart=e.touches[0].clientY;swDir=null;
},{passive:true});
document.getElementById('pageDetail').addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-txStart,dy=e.touches[0].clientY-tyStart;
  if(!swDir) swDir=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(swDir==='h'&&dx>0){
    document.getElementById('pageDetail').style.transform=`translateX(${Math.max(0,dx)}px)`;
  }
},{passive:true});
document.getElementById('pageDetail').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-txStart;
  document.getElementById('pageDetail').style.transform='';
  if(swDir==='h'&&dx>80) goBack();
},{passive:true});

// ══════════════════════════
//  RING SVG
// ══════════════════════════
function ringHTML(pct,color,size){
  const r=(size-7)/2,circ=2*Math.PI*r,dash=pct/100*circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="white" font-size="10" font-family="'DM Mono',monospace" font-weight="600">${Math.round(pct)}%</text>
  </svg>`;
}

// ══════════════════════════
//  DASHBOARD
// ══════════════════════════
function renderDash(){
  const tb=totalBudget(),ts=totalSpent(),rem=tb-ts;
  const pct=tb>0?Math.min(ts/tb*100,100):0;
  const doneS=stages.filter(s=>stagePlanned(s)>0&&stageSpent(s)===stagePlanned(s)).length;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  const showInstall=(!!window._installPrompt||isIOS)&&!isStandalone;

  document.getElementById('dashContent').innerHTML=`
    ${showInstall?`<div class="install-banner">
      <div style="font-size:26px">📲</div>
      <div class="install-banner-text">
        <strong>Установить на рабочий стол</strong>
        ${isIOS?'Safari → Поделиться → «На экран "Домой"»'
          :'<button class="btn btn-sm" style="background:rgba(201,170,124,.2);color:#C9AA7C;border:1px solid rgba(201,170,124,.3);margin-top:6px" onclick="installApp()">Установить</button>'}
      </div></div>`:''}

    <div class="summary-strip">
      <div class="sum-card" style="animation-delay:.04s">
        <div class="sum-label">Общий бюджет</div>
        <div class="sum-val c-gold">${fmtShort(tb)}</div>
        <div class="sum-sub">${stages.length} этапов</div>
      </div>
      <div class="sum-card" style="animation-delay:.08s">
        <div class="sum-label">Потрачено</div>
        <div class="sum-val c-green">${fmtShort(ts)}</div>
        <div class="sum-sub">${Math.round(pct)}% от бюджета</div>
      </div>
      <div class="sum-card full" style="animation-delay:.12s">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="sum-label">Остаток</div>
            <div class="sum-val ${rem<0?'c-red':'c-blue'}">${fmtShort(rem)}</div>
            <div class="sum-sub">${doneS} из ${stages.length} этапов завершено</div>
          </div>
          <div style="text-align:right">
            <div class="sum-label">Позиции</div>
            <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:600">
              ${stages.reduce((a,s)=>a+s.items.filter(i=>i.done).length,0)}<span style="color:var(--text3);font-size:13px"> / ${stages.reduce((a,s)=>a+s.items.length,0)}</span>
            </div>
          </div>
        </div>
        <div class="prog-bar-wrap">
          <div class="prog-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>

    <div class="section-title">Этапы строительства</div>

    ${stages.map((s,i)=>{
      const sp=stageSpent(s),pl=stagePlanned(s);
      const pct=s.budget>0?Math.min(sp/s.budget*100,100):0;
      const done=s.items.filter(i=>i.done).length;
      const over=s.budget-pl<0;
      return `<div class="stage-card" style="animation-delay:${.15+i*.07}s" onclick="goDetail(${s.id})">
        <div class="stage-card-accent" style="background:linear-gradient(90deg,${s.color},transparent)"></div>
        <div class="stage-card-body">
          <div class="stage-card-icon">${s.icon}</div>
          <div class="stage-card-info">
            <div class="stage-card-name">${s.name}</div>
            <div class="stage-card-meta">${done}/${s.items.length} позиций · ${fmt(sp)}</div>
          </div>
          <div class="stage-card-ring">${ringHTML(pct,s.color,54)}</div>
        </div>
        <div class="stage-card-bar"><div class="stage-card-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
        <div class="stage-card-stats">
          <div class="scs-item"><div class="scs-label">Бюджет</div><div class="scs-val c-gold">${fmtShort(s.budget)}</div></div>
          <div class="scs-item"><div class="scs-label">${over?'Перерасход':'Запас'}</div><div class="scs-val ${over?'c-red':'c-blue'}">${fmtShort(Math.abs(s.budget-pl))}</div></div>
        </div>
      </div>`;
    }).join('')}
    ${stages.length===0?`<div class="empty"><div class="empty-icon">🏗</div><div style="font-size:14px">Нажмите + чтобы добавить первый этап</div></div>`:''}
  `;
}

// ══════════════════════════
//  DETAIL
// ══════════════════════════
function renderDetail(){
  const s=stages.find(st=>st.id===activeStageId);
  if(!s) return;
  const sp=stageSpent(s),pct=s.budget>0?Math.min(sp/s.budget*100,100):0;

  document.getElementById('detailHero').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="back-btn" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polyline points="11,4 6,9 11,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Назад
      </button>
      <button class="btn btn-icon btn-sm" onclick="editStage(${s.id})" style="margin-left:auto">✏️</button>
    </div>
    <div class="detail-hero-top">
      <div class="detail-hero-left">
        <div class="detail-hero-icon">${s.icon}</div>
        <div class="detail-hero-name">${s.name}</div>
        <div class="detail-hero-budget">${fmt(sp)} потрачено из ${fmt(s.budget)}</div>
      </div>
      <div>${ringHTML(pct,s.color,64)}</div>
    </div>
    <div class="detail-hero-prog"><div class="detail-hero-prog-fill" style="width:${pct}%;background:${s.color}"></div></div>
  `;

  document.getElementById('detailContent').innerHTML=`
    <div class="stat-grid" style="margin-top:4px">
      <div class="stat-box"><div class="stat-lbl">Бюджет</div><div class="stat-val c-gold">${fmtShort(s.budget)}</div></div>
      <div class="stat-box"><div class="stat-lbl">Выполнено</div><div class="stat-val c-green">${fmtShort(sp)}</div></div>
      <div class="stat-box"><div class="stat-lbl">В смете</div><div class="stat-val">${fmtShort(stagePlanned(s))}</div></div>
      <div class="stat-box"><div class="stat-lbl">${s.budget-stagePlanned(s)<0?'Перерасход':'Запас'}</div>
        <div class="stat-val ${s.budget-stagePlanned(s)<0?'c-red':'c-blue'}">${fmtShort(Math.abs(s.budget-stagePlanned(s)))}</div></div>
    </div>

    <div class="section-title">Позиции</div>
    <div class="items-section">
      <div class="items-header"><span></span><span>Позиция</span><span>Сумма</span><span></span></div>
      ${s.items.length===0?`<div class="empty" style="padding:28px 16px"><div style="font-size:28px;opacity:.3;margin-bottom:8px">📋</div><div style="font-size:13px">Добавьте первую позицию</div></div>`:''}
      ${s.items.map((item,i)=>`
      <div class="item-row" style="animation-delay:${i*.04}s">
        <div class="item-check ${item.done?'done':''}" style="${item.done?'background:'+s.color+';border-color:'+s.color:''}" onclick="toggleItem(${s.id},${item.id})">
          ${item.done?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#0D0F14" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
        </div>
        <div class="item-name ${item.done?'done':''}">${item.name}</div>
        <div class="item-cost" style="${item.done?'color:'+s.color:''}">${fmtShort(item.cost)}</div>
        <button class="item-del" onclick="deleteItem(${s.id},${item.id})">×</button>
      </div>`).join('')}
    </div>

    <div class="add-form">
      <div class="add-form-title">Добавить позицию</div>
      <input type="text" id="newItemName" placeholder="Название работы / материала"/>
      <div class="add-form-row">
        <input type="number" id="newItemCost" placeholder="Сумма, ₼" style="flex:1"/>
        <button class="btn btn-sm" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}44;flex-shrink:0" onclick="addItem(${s.id})">＋ Добавить</button>
      </div>
    </div>

    <button class="btn btn-danger btn-sm" onclick="confirmDeleteStage(${s.id})" style="width:100%;margin-top:4px">🗑 Удалить этап</button>
    <div style="height:8px"></div>
  `;
}

// ══════════════════════════
//  ACTIONS
// ══════════════════════════
function toggleItem(stageId,itemId){
  stages=stages.map(s=>s.id!==stageId?s:{...s,items:s.items.map(i=>i.id===itemId?{...i,done:!i.done}:i)});
  save(stages);renderDetail();
}
function deleteItem(stageId,itemId){
  stages=stages.map(s=>s.id!==stageId?s:{...s,items:s.items.filter(i=>i.id!==itemId)});
  save(stages);renderDetail();showToast('Позиция удалена');
}
function addItem(stageId){
  const name=document.getElementById('newItemName')?.value.trim();
  const cost=parseInt(document.getElementById('newItemCost')?.value);
  if(!name){showToast('Введите название','err');return;}
  if(!cost||cost<=0){showToast('Введите сумму','err');return;}
  stages=stages.map(s=>s.id!==stageId?s:{...s,items:[...s.items,{id:newId(),name,cost,done:false}]});
  save(stages);renderDetail();showToast('Позиция добавлена');
}
function confirmDeleteStage(id){
  const s=stages.find(st=>st.id===id);if(!s)return;
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">Удалить «${s.name}»?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px">Этап и все позиции будут удалены навсегда.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-danger" style="flex:1" onclick="deleteStage(${id})">Удалить</button>
    </div>`);
}
function deleteStage(id){
  stages=stages.filter(s=>s.id!==id);save(stages);closeModal();goBack();showToast('Этап удалён');
}

function showStageModal(existing){
  const isEdit=!!existing;
  const data=existing||{name:'',budget:'',icon:'🏠',color:'#7BB8CC'};
  window._sfd={...data};
  showModal(`<div class="modal-handle"></div>
    <div class="modal-title">${isEdit?'Редактировать':'Новый этап'}</div>
    <div class="form-group"><label class="form-label">Название</label>
      <input type="text" id="sName" placeholder="Например: Благоустройство" value="${data.name}"/></div>
    <div class="form-group"><label class="form-label">Бюджет (₼)</label>
      <input type="number" id="sBudget" placeholder="500000" value="${data.budget||''}"/></div>
    <div class="form-group"><label class="form-label">Иконка</label>
      <div class="icon-grid">${ICONS.map(ic=>`<div class="icon-opt ${ic===data.icon?'sel':''}" onclick="selIcon('${ic}')">${ic}</div>`).join('')}</div></div>
    <div class="form-group"><label class="form-label">Цвет</label>
      <div class="color-grid">${COLORS.map(c=>`<div class="color-opt ${c===data.color?'sel':''}" style="background:${c}" onclick="selColor('${c}')"></div>`).join('')}</div></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveStage('${isEdit?data.id:''}')">${isEdit?'Сохранить':'Создать'}</button>
    </div>`);
}
function selIcon(ic){window._sfd.icon=ic;document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('sel',el.textContent===ic))}
function selColor(c){window._sfd.color=c;document.querySelectorAll('.color-opt').forEach(el=>el.classList.toggle('sel',el.getAttribute('onclick')===`selColor('${c}')`))}
function saveStage(editId){
  const name=document.getElementById('sName')?.value.trim();
  const budget=parseInt(document.getElementById('sBudget')?.value);
  const icon=window._sfd?.icon||'🏠',color=window._sfd?.color||'#7BB8CC';
  if(!name){showToast('Введите название','err');return;}
  if(!budget||budget<=0){showToast('Введите бюджет','err');return;}
  if(editId){
    const id=parseInt(editId);
    stages=stages.map(s=>s.id===id?{...s,name,budget,icon,color}:s);
    showToast('Этап обновлён');
  } else {
    stages=[...stages,{id:newId(),name,icon,color,budget,items:[]}];
    showToast('Этап добавлен');
  }
  save(stages);closeModal();
  if(document.getElementById('pageDetail').classList.contains('page-hidden-right')) renderDash();
  else renderDetail();
  renderDash();
}
function editStage(id){const s=stages.find(st=>st.id===id);if(s)showStageModal(s);}

function showModal(html){
  closeModal();
  const bd=document.createElement('div');
  bd.className='modal-backdrop';bd.id='modalBackdrop';
  bd.innerHTML=`<div class="modal">${html}</div>`;
  bd.addEventListener('click',e=>{if(e.target===bd)closeModal();});
  document.body.appendChild(bd);
}
function closeModal(){document.getElementById('modalBackdrop')?.remove();}

function exportData(){
  const blob=new Blob([JSON.stringify(stages,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`isapp-${new Date().toISOString().split('T')[0]}.json`;
  a.click();URL.revokeObjectURL(url);showToast('Данные сохранены');
}

window._installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();window._installPrompt=e;renderDash();});
function installApp(){
  if(!window._installPrompt)return;
  window._installPrompt.prompt();
  window._installPrompt.userChoice.then(()=>{window._installPrompt=null;renderDash();});
}

document.getElementById('btnAdd').onclick=()=>showStageModal(null);
document.getElementById('btnExport').onclick=exportData;

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

renderDash();
</script>
</body>
</html>
