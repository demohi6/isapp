<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tikinti"/>
<meta name="theme-color" content="#0D0F14"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png"/>
<link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png"/>
<title>Tikinti</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Mulish:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0F14;--bg2:#13161C;--bg3:#1A1E27;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#EAE6DE;--text2:rgba(234,230,222,0.55);--text3:rgba(234,230,222,0.28);
  --gold:#C9AA7C;--blue:#7BB8CC;--green:#80C89A;--red:#CC7B7B;
  --safe:env(safe-area-inset-bottom,0px);--top:env(safe-area-inset-top,0px);
  --drawer:285px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;overflow:hidden}
#app{position:fixed;inset:0;overflow:hidden}
#drawerBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:90;pointer-events:none;transition:background .3s}
#drawerBackdrop.open{background:rgba(0,0,0,.6);pointer-events:all}
#drawer{position:fixed;top:0;left:0;bottom:0;width:var(--drawer);background:#0f1118;border-right:1px solid var(--border2);z-index:100;transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#drawer.open{transform:translateX(0)}
.drawer-header{padding:calc(var(--top) + 20px) 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:2px}
.drawer-sub{font-size:11px;color:var(--text3)}
.drawer-scroll{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch}
.drawer-scroll::-webkit-scrollbar{display:none}
.drawer-section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:4px 10px 8px}
.obj-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;margin-bottom:2px}
.obj-item.active{background:rgba(201,170,124,.12);border:1px solid rgba(201,170,124,.2)}
.obj-item:not(.active){border:1px solid transparent}
.obj-icon{font-size:20px;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:9px}
.obj-info{flex:1;min-width:0}
.obj-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.obj-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.obj-active-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0}
.drawer-btn{margin:6px 10px 0;padding:11px;border-radius:12px;font-size:13px;font-weight:600;font-family:'Mulish',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 20px);transition:background .15s;border:none}
.drawer-btn-add{background:rgba(201,170,124,.08);border:1.5px dashed rgba(201,170,124,.25) !important;color:var(--gold)}
.drawer-btn-pdf{background:rgba(255,255,255,.04);border:1px solid var(--border) !important;color:var(--text2)}
.drawer-footer{padding:14px 16px calc(14px + var(--safe));border-top:1px solid var(--border);flex-shrink:0}
.lang-switch{display:flex;gap:4px;margin-bottom:10px}
.lang-btn{flex:1;padding:6px 4px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text3);font-size:11px;font-weight:700;font-family:'Mulish',sans-serif;cursor:pointer;transition:all .2s;text-align:center}
.lang-btn.active{background:rgba(201,170,124,.15);border-color:rgba(201,170,124,.4);color:var(--gold)}
.page{position:absolute;inset:0;background:var(--bg);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s ease;will-change:transform}
.page::-webkit-scrollbar{display:none}
.page.page-hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.page.page-hidden-left{transform:translateX(-25%);opacity:0;pointer-events:none}
.header{padding:calc(var(--top) + 14px) 16px 12px;background:var(--bg);position:sticky;top:0;z-index:10}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border)}
.header-row{display:flex;align-items:center;gap:10px}
.burger{width:38px;height:38px;border-radius:10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4.5px;flex-shrink:0}
.burger-line{width:16px;height:1.5px;background:var(--text2);border-radius:1px}
.header-title{flex:1;min-width:0}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo span{color:var(--gold)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--gold);background:none;border:none;cursor:pointer;padding:4px 0;font-family:'Mulish',sans-serif}
.content{padding:16px 16px calc(32px + var(--safe))}
.budget-banner{background:linear-gradient(135deg,rgba(201,170,124,.12),rgba(201,170,124,.04));border:1px solid rgba(201,170,124,.25);border-radius:16px;padding:16px;margin-bottom:14px;display:block;animation:fadeUp .35s ease both}
.bb-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.bb-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:var(--gold);margin-bottom:2px}
.section-divider{height:1px;background:var(--border);margin:6px 0 16px;position:relative}
.section-divider::before{content:'';position:absolute;left:0;top:-1px;width:40px;height:3px;background:var(--gold);border-radius:2px}
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px;margin-top:4px}
.stage-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .18s;animation:fadeUp .4s ease both;position:relative;-webkit-user-select:none;user-select:none}
.stage-card:active{transform:scale(.97)}
.stage-card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.stage-card-body{padding:14px 16px 12px;display:flex;align-items:center;gap:14px}
.stage-card-icon{font-size:26px;flex-shrink:0}
.stage-card-info{flex:1;min-width:0}
.stage-card-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-card-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.stage-card-bar-track{height:4px;background:rgba(255,255,255,.05);margin:0 16px 0;border-radius:2px;overflow:hidden;position:relative}
.scb-smeta{position:absolute;top:0;left:0;height:100%;border-radius:2px;opacity:.35}
.scb-fact{position:absolute;top:0;left:0;height:100%;border-radius:2px}
.stage-card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.scs-item{background:var(--bg2);padding:9px 12px}
.scs-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.scs-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.stage-card-collapsed{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;-webkit-user-select:none;user-select:none;animation:fadeUp .35s ease both}
.scc-check{width:22px;height:22px;border-radius:6px;background:rgba(128,200,154,.15);border:1.5px solid rgba(128,200,154,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.scc-icon{font-size:18px;flex-shrink:0}
.scc-name{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scc-sum{font-family:'DM Mono',monospace;font-size:12px;color:var(--green);flex-shrink:0}
.detail-hero{padding:calc(var(--top) + 14px) 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.detail-hero-name{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px}
.detail-hero-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:10px}
.detail-two-bar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;position:relative;margin-bottom:0}
.dtb-smeta{position:absolute;top:0;left:0;height:100%;border-radius:3px;opacity:.35;transition:width .5s}
.dtb-fact{position:absolute;top:0;left:0;height:100%;border-radius:3px;transition:width .5s}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
/* POSITION CARDS */
.pos-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;animation:fadeUp .3s ease both}
.pos-card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-user-select:none;user-select:none}
.pos-card-header:active{background:rgba(255,255,255,.03)}
.pos-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pos-status-idle{background:rgba(255,255,255,.15)}
.pos-status-active{background:var(--gold)}
.pos-status-done{background:var(--green)}
.pos-card-name{flex:1;font-size:14px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:'Mulish',sans-serif;transition:all .15s;-webkit-user-select:none;user-select:none}
.status-idle{background:rgba(255,255,255,.07);color:var(--text3);border-color:var(--border)}
.status-active{background:rgba(201,170,124,.15);color:var(--gold);border-color:rgba(201,170,124,.3)}
.status-done{background:rgba(128,200,154,.15);color:var(--green);border-color:rgba(128,200,154,.3)}
/* ITEM ROWS */
.pos-item-row{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
.pos-item-row:last-child{border-bottom:none}
.pos-item-info{flex:1;min-width:0}
.pos-item-name{font-size:13px;font-weight:500;margin-bottom:2px}
.pos-item-name.done{text-decoration:line-through;color:var(--text3)}
.pos-item-sub{font-size:10px;color:var(--text3);margin-top:1px}
.pos-item-cost{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);flex-shrink:0;margin-top:2px;white-space:nowrap}
.pos-item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px 6px;flex-shrink:0;line-height:1}
.add-form{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:14px 16px;margin-bottom:12px}
.add-form-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
input[type=text],input[type=number],textarea{background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 12px;font-family:'Mulish',sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .2s;-webkit-appearance:none}
input:focus,textarea:focus{border-color:rgba(255,255,255,.3)}
.btn{cursor:pointer;border:none;border-radius:12px;font-family:'Mulish',sans-serif;font-weight:600;font-size:14px;padding:12px 16px;transition:transform .15s,opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:#0D0F14;width:100%}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text2);flex:1}
.btn-danger{background:rgba(204,123,123,.15);color:var(--red)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn-icon{padding:9px;border-radius:10px;background:none;border:none}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:20px 20px calc(20px + var(--safe));max-height:85vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:12px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px}
.icon-opt{width:42px;height:42px;border-radius:10px;border:1.5px solid transparent;background:rgba(255,255,255,.05);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-opt.sel{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.color-opt.sel{border-color:white;transform:scale(1.15)}
.drum-picker{display:flex;gap:0;justify-content:center;margin:12px 0}
.drum-col{display:flex;flex-direction:column;align-items:center;flex:1}
.drum-col-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
.drum-wrap{position:relative;height:220px;width:100%;overflow:hidden;background:none;cursor:pointer}
.drum-wrap::before,.drum-wrap::after{content:'';position:absolute;left:0;right:0;height:88px;z-index:2;pointer-events:none}
.drum-wrap::before{top:0;background:linear-gradient(to bottom,var(--bg2) 40%,rgba(13,15,20,.85) 70%,transparent 100%)}
.drum-wrap::after{bottom:0;background:linear-gradient(to top,var(--bg2) 40%,rgba(13,15,20,.85) 70%,transparent 100%)}
.drum-selector{position:absolute;top:50%;left:8px;right:8px;height:44px;transform:translateY(-50%);pointer-events:none;z-index:1;border-top:1px solid rgba(201,170,124,.6);border-bottom:1px solid rgba(201,170,124,.6)}
.drum-divider{width:1px;background:rgba(255,255,255,.07);height:220px;flex-shrink:0}
.drum-list{position:absolute;width:100%;will-change:transform;user-select:none;-webkit-user-select:none}
.drum-item{height:44px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;color:rgba(234,230,222,.15);transition:color .1s,font-size .1s}
.drum-item.near{color:rgba(234,230,222,.4);font-size:15px}
.drum-item.active{color:var(--text);font-size:18px;font-weight:700}
.drum-date-display{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin:4px 0;font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);text-align:center;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.drum-date-display:active{transform:scale(.98)}
.drum-date-display.has-value{color:var(--gold);border-color:rgba(201,170,124,.3);background:rgba(201,170,124,.06)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.toast{position:fixed;bottom:calc(28px + var(--safe));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,35,45,.95);color:var(--text);padding:10px 18px;border-radius:24px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;z-index:999;pointer-events:none;backdrop-filter:blur(10px);border:1px solid var(--border2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.c-gold{color:var(--gold)}.c-green{color:var(--green)}.c-blue{color:var(--blue)}.c-red{color:var(--red)}
.pin-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.pin-logo{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:8px}
.pin-subtitle{font-size:14px;color:var(--text2);margin-bottom:32px}
.pin-dots{display:flex;gap:16px;margin-bottom:36px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.2);transition:all .2s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;margin-bottom:20px}
.pin-key{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-family:'Mulish',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;font-size:22px;font-weight:600}
.pin-key:active{transform:scale(.9);background:rgba(255,255,255,.12)}
.pin-key.empty{background:none;border:none;cursor:default}
.pin-key-sub{font-size:9px;letter-spacing:1.5px;opacity:.5;margin-top:-2px}
.pin-bio{background:none;border:none;font-size:36px;cursor:pointer;margin-top:4px}
#pageDash .content{padding-bottom:calc(32px + var(--safe))}
</style>
</head>
<body>
<div id="app">
  <div id="drawerBackdrop" onclick="closeDrawer()"></div>
  <div id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">🏡 Tikinti</div>
      <div class="drawer-sub" id="drawerSub">Мои объекты</div>
    </div>
    <div class="drawer-scroll">
      <div class="drawer-section-label" id="dlObjects">МОИ ОБЪЕКТЫ</div>
      <div id="drawerObjects"></div>
      <button class="drawer-btn drawer-btn-add" id="drawerBtnAdd" onclick="addObjectPrompt()">＋ Новый объект</button>
      <button class="drawer-btn drawer-btn-pdf" id="drawerBtnPdf" onclick="closeDrawer();exportPDF()">📄 PDF экспорт</button>
      <button class="drawer-btn drawer-btn-pdf" onclick="closeDrawer();triggerImport()" style="margin-top:4px">📥 <span id="importBtnLabel">Импорт JSON</span></button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)"/>
      <div style="margin-top:16px;padding:0 4px">
        <div class="drawer-section-label" id="dlLang">ЯЗЫК</div>
        <div class="lang-switch">
          <button class="lang-btn" id="langAZ" onclick="setLang('az')">AZ</button>
          <button class="lang-btn active" id="langRU" onclick="setLang('ru')">RU</button>
          <button class="lang-btn" id="langEN" onclick="setLang('en')">EN</button>
        </div>
      </div>
      <div style="margin-top:4px;padding:0 4px">
        <button class="drawer-btn drawer-btn-pdf" style="margin:0;width:100%" onclick="closeDrawer();pinSettings()">🔐 PIN</button>
      </div>
    </div>
    <div class="drawer-footer">
      <div style="font-size:11px;color:var(--text3);line-height:1.6" id="drawerFooterText">💾 Данные хранятся на устройстве</div>
    </div>
  </div>

  <div class="page" id="pageDash">
    <div class="header">
      <div class="header-row">
        <button class="burger" onclick="openDrawer()">
          <div class="burger-line"></div><div class="burger-line"></div><div class="burger-line"></div>
        </button>
        <div class="header-title">
          <div class="logo" id="headerTitle">🏡 <span>Tikinti</span></div>
          <div class="logo-sub" id="headerSub"></div>
        </div>
        <div style="display:flex;gap:7px;flex-shrink:0">

const fmt=n=>{try{return new Intl.NumberFormat('az-AZ',{style:'currency',currency:'AZN',maximumFractionDigits:0}).format(n);}catch{return Math.round(n).toLocaleString()+' ₼';}};
const fmtShort=n=>{const abs=Math.abs(n),s=n<0?'−':'';if(abs>=1e6)return s+(abs/1e6).toFixed(1).replace('.0','')+' млн ₼';return fmt(n);};

function tName(o){if(!o)return'';return o['name_'+lang]||o.name_ru||o.name||'';}
function migrateV8toV9(old){
  const db={objects:[],activeObjectId:old.activeObjectId};
  (old.objects||[]).forEach(o=>{
    const no={id:o.id,name:tName(o)||'Object',icon:o.icon||'🏠',totalBudget:o.totalBudget||0,stages:[]};
    (o.stages||[]).forEach(s=>{
      const ns={id:s.id,name:tName(s)||'Stage',icon:s.icon||'🏗',color:s.color||'#C9AA7C',status:s.status||'idle',positions:[]};
      (s.items||[]).forEach(item=>{
        const pos={id:newId(),name:tName(item)||item.name||'Позиция',status:item.done?'done':'idle',works:[],mats:[]};
        if(item.type==='mat'){pos.mats.push({id:newId(),name:tName(item)||item.name||'',qty:item.qty||1,unit:item.unit||'шт',price:item.price||0,note:item.note||''});}
        else{pos.works.push({id:newId(),name:tName(item)||item.name||'',contractAmount:item.contractAmount||item.price||0,paid:item.paid||0,contractor:item.contractor||'',phone:item.phone||'',startDate:item.startDate||'',endDate:item.endDate||'',note:item.note||'',done:item.done||false});}
        ns.positions.push(pos);
      });
      no.stages.push(ns);
    });
    db.objects.push(no);
  });
  return db;
}
function loadDB(){
  try{
    const d=JSON.parse(localStorage.getItem(STORE_KEY));
    if(d&&d.objects&&(d.objects[0]?.stages?.length===0||d.objects[0]?.stages?.[0]?.positions))return d;
    const d8=JSON.parse(localStorage.getItem('isapp_v8'));
    if(d8&&d8.objects){const m=migrateV8toV9(d8);localStorage.setItem(STORE_KEY,JSON.stringify(m));return m;}
  }catch(e){console.warn(e);}
  return{objects:[JSON.parse(JSON.stringify(DEFAULT_OBJECT))],activeObjectId:1};
}
function saveDB(){localStorage.setItem(STORE_KEY,JSON.stringify(db));}
let db=loadDB();
let activeStageId=null,activePosId=null;
const curObj=()=>db.objects.find(o=>o.id===db.activeObjectId)||db.objects[0];
const stages=()=>curObj().stages||[];
const newId=()=>Date.now()+Math.floor(Math.random()*9999);
// calcs
const workTotal=w=>w.contractAmount||0;
const matTotal=m=>(m.qty||1)*(m.price||0);
const posSmeta=p=>(p.works||[]).reduce((a,w)=>a+workTotal(w),0)+(p.mats||[]).reduce((a,m)=>a+matTotal(m),0);
const posFact=p=>(p.works||[]).reduce((a,w)=>a+(w.paid||0),0)+(p.mats||[]).reduce((a,m)=>a+matTotal(m),0);
const stageSmeta=s=>(s.positions||[]).reduce((a,p)=>a+posSmeta(p),0);
const stageFact=s=>(s.positions||[]).reduce((a,p)=>a+posFact(p),0);
const totalSmeta=()=>stages().reduce((a,s)=>a+stageSmeta(s),0);
const totalFact=()=>stages().reduce((a,s)=>a+stageFact(s),0);
const totalBudget=()=>curObj().totalBudget||0;
const OBJ_ICONS=['🏠','🏡','🏗','🏢','🏬','🏭','🌳','🌿','🏊','🔑','⬛','🧱'];
const ICONS=['🏠','🏗','⬛','🪟','⚙️','🎨','🌿','🧱','🔧','💡','🚿','🛠','🏡','🌲','🪣','🔑','🏊','🌳'];
const COLORS=['#C9AA7C','#7BB8CC','#CC7B7B','#9E8ED4','#80C89A','#C8C07E','#CC9B7B','#7BC4CC','#B87BB8','#7BA8CC'];
function ringHTML(pct,color,size){const r=size/2-5,circ=2*Math.PI*r,off=circ*(1-pct/100);return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;flex-shrink:0"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="4"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .5s"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="${color}" font-family="'DM Mono',monospace" font-size="${size>50?11:9}" font-weight="700">${Math.round(pct)}%</text></svg>`;}
// ── TOAST ──
function showToast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=(type==='ok'?'✓ ':type==='err'?'✕ ':'')+msg;el.className='toast show';clearTimeout(el._to);el._to=setTimeout(()=>{el.className='toast';},2400);}

function openDrawer(){drawerEl.classList.add('open');backdropEl.classList.add('open');updateDrawerLabels();renderDrawer();}
function closeDrawer(){drawerEl.classList.remove('open');backdropEl.classList.remove('open');}
function renderDrawer(){
  document.getElementById('drawerObjects').innerHTML=db.objects.map(o=>{
    const ts=(o.stages||[]).reduce((a,s)=>a+(s.positions||[]).reduce((b,p)=>b+posSmeta(p),0),0);
    const tf=(o.stages||[]).reduce((a,s)=>a+(s.positions||[]).reduce((b,p)=>b+posFact(p),0),0);
    const pct=ts>0?Math.round(tf/ts*100):0;
    const isActive=o.id===db.activeObjectId;
    return`<div class="obj-item ${isActive?'active':''}" onclick="switchObject(${o.id})">
      <div class="obj-icon">${o.icon}</div>
      <div class="obj-info"><div class="obj-name">${tName(o)}</div>
      <div class="obj-meta">${(o.stages||[]).length} ${lang==='en'?'stages':lang==='az'?'mərhələ':'эт.'} · ${pct}%</div></div>
      ${isActive?'<div class="obj-active-dot"></div>':''}
      <button onclick="event.stopPropagation();editObjectPrompt(${o.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:4px;flex-shrink:0">✏️</button>
    </div>`;
  }).join('');
}
function switchObject(id){db.activeObjectId=id;activeStageId=null;activePosId=null;saveDB();closeDrawer();['pageDetail','pagePos'].forEach(pg=>document.getElementById(pg).classList.add('page-hidden-right'));document.getElementById('pageDash').classList.remove('page-hidden-left');renderDash();showToast(tName(curObj()));}
function addObjectPrompt(){closeDrawer();window._objfd={icon:'🏠'};showModal(`<div class="modal-handle"></div><div class="modal-title">${t('newObj')}</div><div class="form-group"><label class="form-label">${t('objName')}</label><input type="text" id="oName" placeholder="${t('objNamePh')}"/></div><div class="form-group"><label class="form-label">${t('objBudget')}</label><input type="number" id="oBudget" placeholder="200000"/></div><div class="form-group"><label class="form-label">${t('objIcon')}</label><div class="icon-grid">${OBJ_ICONS.map(ic=>`<div class="icon-opt ${ic==='🏠'?'sel':''}" onclick="selObjIcon('${ic}')">${ic}</div>`).join('')}</div></div><div style="display:flex;gap:10px;margin-top:4px"><button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="createObject()">${t('create')}</button></div>`);}

function selObjIcon(ic){window._objfd.icon=ic;document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('sel',el.textContent===ic));}
function createObject(){const name=document.getElementById('oName')?.value.trim();const budget=parseInt(document.getElementById('oBudget')?.value)||0;if(!name){showToast(t('enterName'),'err');return;}const id=newId();db.objects.push({id,name,icon:window._objfd.icon||'🏠',totalBudget:budget,stages:[]});db.activeObjectId=id;saveDB();closeModal();renderDash();showToast(t('objCreated'));}
function saveObject(){const name=document.getElementById('oName')?.value.trim();const budget=parseInt(document.getElementById('oBudget')?.value)||0;if(!name){showToast(t('enterName'),'err');return;}const id=window._objfd.id;db.objects=db.objects.map(o=>o.id===id?{...o,name,icon:window._objfd.icon||o.icon,totalBudget:budget}:o);saveDB();closeModal();renderDash();renderDrawer();showToast(t('objUpdated'));}
function deleteObjectConfirm(id){showModal(`<div class="modal-handle"></div><div class="modal-title">${t('deleteObj')}?</div><p style="color:var(--text2);font-size:14px;margin-bottom:20px">${t('deleteObjConfirm')}</p><div style="display:flex;gap:10px"><button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-danger" style="flex:1" onclick="deleteObject(${id})">${t('delete')}</button></div>`);}
function deleteObject(id){if(db.objects.length<=1){showToast(t('cantDeleteLast'),'err');closeModal();return;}db.objects=db.objects.filter(o=>o.id!==id);db.activeObjectId=db.objects[0].id;saveDB();closeModal();['pageDetail','pagePos'].forEach(pg=>document.getElementById(pg).classList.add('page-hidden-right'));renderDash();showToast(t('objDeleted'));}
// ── NAVIGATION ──
function goDetail(stageId){activeStageId=stageId;document.getElementById('pageDash').classList.add('page-hidden-left');document.getElementById('pageDetail').classList.remove('page-hidden-right');document.getElementById('pagePos').classList.add('page-hidden-right');renderDetail();}
function goPos(posId){activePosId=posId;document.getElementById('pageDetail').classList.add('page-hidden-left');document.getElementById('pagePos').classList.remove('page-hidden-right');renderPos();}
function goBack(){
  const pp=document.getElementById('pagePos');
  if(!pp.classList.contains('page-hidden-right')){pp.classList.add('page-hidden-right');document.getElementById('pageDetail').classList.remove('page-hidden-left');renderDetail();}
  else{document.getElementById('pageDetail').classList.add('page-hidden-right');document.getElementById('pageDash').classList.remove('page-hidden-left');}
}
// ── DASH ──
function renderDash(){
  const obj=curObj(),st=stages(),tb=totalBudget(),ts=totalSmeta(),tf=totalFact();
  const rem=tb-ts,isOver=ts>tb&&tb>0,factPct=ts>0?Math.min(tf/ts*100,100):0;
  document.getElementById('headerTitle').innerHTML=`${obj.icon} <span>${tName(obj)||obj.name}</span>`;
  document.getElementById('headerSub').textContent=`${st.length} ${lang==='en'?'stages':lang==='az'?'mərhələ':'этапов'}`;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
  document.getElementById('dashContent').innerHTML=`
    ${(!isStandalone&&isIOS)?`<div class="budget-banner" style="background:rgba(255,255,255,.03);border-color:var(--border);padding:12px 14px;animation-delay:.02s"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:24px">📲</div><div><div style="font-size:13px;font-weight:600;margin-bottom:2px">${t('install')}</div><div style="font-size:11px;color:var(--text3)">${t('installHint')}</div></div></div></div>`:''}
    ${(!isStandalone&&!isIOS&&window._installPrompt)?`<div class="budget-banner" style="background:rgba(255,255,255,.03);border-color:var(--border);padding:12px 14px;animation-delay:.02s"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:13px;font-weight:600">${t('install')}</div></div><button class="btn btn-sm" style="background:rgba(201,170,124,.2);color:#C9AA7C;border:1px solid rgba(201,170,124,.3)" onclick="installApp()">${t('installBtn')}</button></div></div>`:''}
    <div class="budget-banner" style="animation-delay:.04s">
      <div class="bb-label">${t('totalBudget')}</div>
      <div class="bb-val">${tb>0?fmtShort(tb):t('budgetNotSet')}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:14px">${tb>0?(isOver?`<span style="color:var(--red)">${t('budgetOver')} +${fmtShort(ts-tb)}</span>`:`${t('budgetLeft')}: ${fmtShort(rem)}`):t('setBudget')}</div>
      <div class="bb-label">${t('smeta')}</div>
      <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--text);margin-bottom:12px">${fmtShort(ts)}</div>
      <div class="bb-label">${t('fact')}</div>
      <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--green);margin-bottom:12px">${fmtShort(tf)}</div>
      <div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;position:relative;margin-bottom:6px"><div style="position:absolute;inset:0;background:rgba(201,170,124,.3);border-radius:3px"></div><div style="position:absolute;top:0;left:0;height:100%;width:${ts>0?Math.min(tf/ts*100,100):0}%;background:var(--green);border-radius:3px;transition:width .7s ease"></div></div>
      <div style="font-size:11px;color:var(--text3)">${Math.round(factPct)}% ${t('pctDone')}</div>
    </div>
    <div class="section-divider"></div>
    <div class="section-title">${t('stages')}</div>
    ${st.map((s,i)=>{
      const sm=stageSmeta(s),fc=stageFact(s),fp=sm>0?Math.min(fc/sm*100,100):0;
      const pc=(s.positions||[]).length,dc=(s.positions||[]).filter(p=>p.status==='done').length;
      const over=fc>sm&&sm>0;
      if(s.status==='done')return`<div class="stage-card-collapsed" style="animation-delay:${.12+i*.07}s;border-left:3px solid ${s.color}" onclick="goDetail(${s.id})"><div class="scc-check"><svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#80C89A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="scc-icon">${s.icon}</div><div class="scc-name">${tName(s)}</div><div class="scc-sum">${fmtShort(fc)}</div><div style="font-size:11px;color:var(--green);margin-left:2px">✓</div></div>`;
      return`<div class="stage-card" style="animation-delay:${.12+i*.07}s" onclick="goDetail(${s.id})">
        <div class="stage-card-accent" style="background:linear-gradient(90deg,${s.color},transparent)"></div>
        <div class="stage-card-body"><div class="stage-card-icon">${s.icon}</div>
          <div class="stage-card-info"><div class="stage-card-name">${tName(s)}</div>
          <div class="stage-card-meta">${pc>0?`${dc}/${pc} ${t('positions').toLowerCase()}`:''}</div></div>
          <div>${ringHTML(fp,s.color,54)}</div></div>
        <div class="stage-card-bar-track"><div class="scb-smeta" style="width:100%;background:${s.color}"></div><div class="scb-fact" style="width:${fp}%;background:${s.color}"></div></div>
        <div class="stage-card-stats">
          <div class="scs-item"><div class="scs-label">${t('smetaLabel')}</div><div class="scs-val c-gold">${fmtShort(sm)}</div></div>
          <div class="scs-item"><div class="scs-label">${t('factShort')}</div><div class="scs-val c-green">${fmtShort(fc)}</div></div>
          <div class="scs-item"><div class="scs-label">${t('remainder')}</div><div class="scs-val ${over?'c-red':'c-blue'}">${fmtShort(sm-fc)}</div></div>
        </div></div>`;
    }).join('')}
    ${st.length===0?`<div class="empty"><div style="font-size:48px;opacity:.3;margin-bottom:12px">🏗</div><div style="font-size:14px;margin-bottom:20px">${t('noStages')}</div><button class="btn btn-primary" style="max-width:220px;margin:0 auto" onclick="showStageModal(null)">＋ ${t('addStage')}</button></div>`:''}`;
}
// ── DETAIL (Stage → Positions) ──
function renderDetail(){
  const s=stages().find(st=>st.id===activeStageId);if(!s)return;
  const sm=stageSmeta(s),fc=stageFact(s),fp=sm>0?Math.min(fc/sm*100,100):0;
  const positions=s.positions||[];
  document.getElementById('detailHero').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="back-btn" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polyline points="11,4 6,9 11,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>${t('backBtn')}</button>
      <button class="btn btn-icon btn-sm" onclick="editStage(${s.id})" style="margin-left:auto">✏️</button>
    </div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
      <div style="flex:1;min-width:0"><div style="font-size:28px;margin-bottom:5px">${s.icon}</div>
        <div class="detail-hero-name">${tName(s)}</div>
        <div class="detail-hero-sub">${fmt(fc)} ${t('factLabel')} · ${t('smetaLabel')}: ${fmt(sm)}</div></div>
      <div>${ringHTML(fp,s.color,64)}</div></div>
    <div class="detail-two-bar"><div class="dtb-smeta" style="width:100%;background:${s.color}"></div><div class="dtb-fact" style="width:${fp}%;background:${s.color}"></div></div>`;
  document.getElementById('detailContent').innerHTML=`
    <div class="stat-grid" style="margin-top:4px">
      <div class="stat-box"><div class="stat-lbl">${t('smetaLabel')}</div><div class="stat-val c-gold">${fmtShort(sm)}</div></div>
      <div class="stat-box"><div class="stat-lbl">${t('factShort')}</div><div class="stat-val c-green">${fmtShort(fc)}</div></div>
      <div class="stat-box"><div class="stat-lbl">${t('remainder')}</div><div class="stat-val ${sm-fc<0?'c-red':'c-blue'}">${fmtShort(sm-fc)}</div></div>
      <div class="stat-box"><div class="stat-lbl">${t('positions')}</div><div class="stat-val">${positions.filter(p=>p.status==='done').length}/${positions.length}</div></div>
    </div>
    <div class="section-title">${t('positions')}</div>
    ${positions.map((p,i)=>{
      const ps=posSmeta(p),pf=posFact(p);
      const wc=(p.works||[]).length,mc=(p.mats||[]).length;
      const sc=p.status==='done'?'pos-status-done':p.status==='active'?'pos-status-active':'pos-status-idle';
      const sl=p.status==='done'?t('statusDone'):p.status==='active'?t('statusActive'):t('statusIdle');
      const sp=p.status==='done'?'status-done':p.status==='active'?'status-active':'status-idle';
      return`<div class="pos-card" style="animation-delay:${i*.05}s">
        <div class="pos-card-header" onclick="goPos(${p.id})">
          <div class="pos-status-dot ${sc}"></div>
          <div class="pos-card-name">${p.name}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span class="status-pill ${sp}" onclick="event.stopPropagation();cyclePosStatus(${s.id},${p.id})">${sl}</span>
            <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)">${fmtShort(ps)}</div>
            <button onclick="event.stopPropagation();deletePosConfirm(${s.id},${p.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:2px 4px;line-height:1">×</button>
          </div>
        </div>
        ${(wc>0||mc>0)?`<div style="padding:6px 14px 10px;border-top:1px solid var(--border);background:rgba(0,0,0,.1)"><div style="font-size:11px;color:var(--text3);display:flex;gap:14px;flex-wrap:wrap">${wc>0?`<span>👷 ${wc}</span>`:''} ${mc>0?`<span>🧱 ${mc}</span>`:''} ${pf>0?`<span style="color:var(--green);margin-left:auto">▶ ${fmtShort(pf)}</span>`:''}</div></div>`:''}
      </div>`;
    }).join('')}
    ${positions.length===0?`<div class="empty" style="padding:24px 16px"><div style="font-size:28px;opacity:.3;margin-bottom:8px">📋</div><div style="font-size:13px">${lang==='ru'?'Нет позиций':lang==='az'?'Mövqe yoxdur':'No positions'}</div></div>`:''}
    <div class="add-form">
      <div class="add-form-title">＋ ${t('addPos')}</div>
      <input type="text" id="newPosName" placeholder="${t('posNamePh')}"/>
      <button class="btn btn-primary" style="margin-top:10px" onclick="addPosition(${s.id})">＋ ${t('addPos')}</button>
    </div>

    <div style="height:8px"></div>`;
}
// ── POS PAGE (Works & Mats inside position) ──
function renderPos(){
  const s=stages().find(st=>st.id===activeStageId);if(!s)return;
  const p=(s.positions||[]).find(pos=>pos.id===activePosId);if(!p)return;
  const ps=posSmeta(p),pf=posFact(p),fp=ps>0?Math.min(pf/ps*100,100):0;
  const works=p.works||[],mats=p.mats||[];
  const sl=p.status==='done'?t('statusDone'):p.status==='active'?t('statusActive'):t('statusIdle');
  const sp=p.status==='done'?'status-done':p.status==='active'?'status-active':'status-idle';
  document.getElementById('posHero').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="back-btn" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polyline points="11,4 6,9 11,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>${t('backBtn')}</button>
      <button onclick="editPosPrompt(${s.id},${p.id})" class="btn btn-icon btn-sm" style="margin-left:auto">✏️</button>
    </div>
    <div style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div class="detail-hero-name" style="flex:1">${p.name}</div>
        <button class="status-pill ${sp}" onclick="cyclePosStatus(${s.id},${p.id})">${sl}</button>
      </div>
      <div class="detail-hero-sub">${fmt(pf)} ${t('factLabel')} · ${t('smetaLabel')}: ${fmt(ps)}</div>
    </div>
    <div class="detail-two-bar"><div class="dtb-smeta" style="width:100%;background:${s.color}"></div><div class="dtb-fact" style="width:${fp}%;background:${s.color}"></div></div>`;
  const wTotal=works.reduce((a,w)=>a+workTotal(w),0);
  const mTotal=mats.reduce((a,m)=>a+matTotal(m),0);

    </div>
    ${works.length>0?`<div class="section-title" style="color:var(--blue)">👷 ${t('typeWork')}</div>
    <div style="background:var(--bg2);border:1px solid rgba(123,184,204,.15);border-radius:14px;overflow:hidden;margin-bottom:14px">
      ${works.map((w,i)=>{
        const unpaid=Math.max(0,(w.contractAmount||0)-(w.paid||0));
        const today=new Date();today.setHours(0,0,0,0);
        const overdue=!w.done&&w.endDate&&new Date(w.endDate)<today;
        return`<div class="pos-item-row" style="animation-delay:${i*.04}s">
          <div onclick="toggleWork(${s.id},${p.id},${w.id})" style="width:22px;height:22px;border-radius:6px;border:1.5px solid ${w.done?'transparent':'rgba(255,255,255,.2)'};background:${w.done?'var(--blue)':'none'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .2s">
            ${w.done?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#0D0F14" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
          </div>
          <div class="pos-item-info" onclick="editWorkPrompt(${s.id},${p.id},${w.id})" style="cursor:pointer">
            <div class="pos-item-name ${w.done?'done':''}">${w.name}${overdue?' <span style="color:var(--red);font-size:10px">⚠️</span>':''}</div>
            <div class="pos-item-sub">${w.contractAmount?`📋 ${fmtShort(w.contractAmount)} `:''} ${w.paid?`<span style="color:var(--green)">✓ ${fmtShort(w.paid)}</span> `:''} ${unpaid>0?`<span style="color:var(--red)">⏳ ${fmtShort(unpaid)}</span>`:''}</div>

            ${(w.startDate||w.endDate)?`<div class="pos-item-sub" style="color:${overdue?'var(--red)':'var(--text3)'}">📅 ${w.startDate?w.startDate.split('-').reverse().join('.'):'?'}${w.endDate?' → '+w.endDate.split('-').reverse().join('.'):''}${overdue?' ⚠️':''}</div>`:''}
            ${w.note?`<div class="pos-item-sub">${w.note}</div>`:''}
          </div>
          <div class="pos-item-cost">${fmtShort(w.contractAmount||0)}</div>

        <div class="pos-item-info" onclick="editMatPrompt(${s.id},${p.id},${m.id})" style="cursor:pointer">
          <div class="pos-item-name">${m.name}</div>
          <div class="pos-item-sub">${m.qty||1} ${m.unit||t('unitPcs')} × ${fmtShort(m.price||0)} = <span style="color:var(--gold)">${fmtShort(matTotal(m))}</span></div>

        </div>
        <div class="pos-item-cost">${fmtShort(matTotal(m))}</div>
        <button class="pos-item-del" onclick="deleteMat(${s.id},${p.id},${m.id})">×</button>

    ${works.length===0&&mats.length===0?`<div class="empty" style="padding:20px 16px"><div style="font-size:28px;opacity:.3;margin-bottom:6px">📋</div><div style="font-size:12px">${lang==='ru'?'Добавьте работы или материалы':lang==='az'?'İş və ya material əlavə edin':'Add works or materials'}</div></div>`:''}
    <div class="add-form" style="border-color:rgba(123,184,204,.2)">
      <div class="add-form-title" style="color:var(--blue)">👷 ${t('addWork')}</div>
      <input type="text" id="newWorkName" placeholder="${t('workName')}"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div><div class="form-label" style="font-size:10px;margin-bottom:4px">${t('contractAmount')} ₼</div><input type="number" id="newWorkContract" placeholder="0"/></div>
        <div><div class="form-label" style="font-size:10px;margin-bottom:4px">${t('paid')} ₼</div><input type="number" id="newWorkPaid" placeholder="0"/></div>
      </div>
      <input type="text" id="newWorkContractor" placeholder="👤 ${t('contractorPh')}" style="margin-top:8px"/>
      <input type="text" id="newWorkPhone" placeholder="📞 ${t('phonePh')}" style="margin-top:8px"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div><div class="drum-date-display" id="nwStartDisp" onclick="openDrumPicker('nwStart','')" style="padding:8px 10px;font-size:12px">📅 ${t('startDate')}</div><input type="hidden" id="nwStartVal"/></div>

      <input type="text" id="newWorkNote" placeholder="${t('notePh')}" style="margin-top:8px"/>
      <button class="btn btn-sm" style="background:rgba(123,184,204,.12);color:var(--blue);border:1px solid rgba(123,184,204,.3);width:100%;margin-top:8px" onclick="addWork(${s.id},${p.id})">＋ ${t('addWork')}</button>
    </div>
    <div class="add-form" style="margin-top:10px;border-color:rgba(201,170,124,.2)">

    </div>
    <div style="height:8px"></div>`;

// ── DRUM DATE PICKER ──
const MONTHS_RU=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MONTHS_EN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_AZ=['Yan','Fev','Mar','Apr','May','İyn','İyl','Avq','Sen','Okt','Noy','Dek'];
const getMonths=()=>lang==='en'?MONTHS_EN:lang==='az'?MONTHS_AZ:MONTHS_RU;
let _drum={field:null,day:1,month:1,year:new Date().getFullYear()};
function openDrumPicker(field,currentVal){
  const now=new Date();_drum.field=field;
  if(currentVal&&currentVal.length===10){const p=currentVal.split('-').map(Number);_drum.day=p[2];_drum.month=p[1];_drum.year=p[0];}
  else{_drum.day=now.getDate();_drum.month=now.getMonth()+1;_drum.year=now.getFullYear();}
  const days=Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0'));
  const months=getMonths();
  const years=Array.from({length:8},(_,i)=>String(now.getFullYear()+i));
  const clr=lang==='en'?'Clear':lang==='az'?'Sil':'Очистить';
  const dl=lang==='en'?'Day':lang==='az'?'Gün':'День';
  const ml=lang==='en'?'Month':lang==='az'?'Ay':'Месяц';
  const yl=lang==='en'?'Year':lang==='az'?'İl':'Год';
  const isOv=(field==='ewStart'||field==='ewEnd');
  const showFn=isOv?showDrumOverlay:showModal;
  showFn('<div class="modal-handle"></div>'
    +'<div class="modal-title">'+(field.includes('Start')||field==='nwStart'?t('startDate'):t('endDate'))+'</div>'
    +'<div class="drum-picker">'
      +'<div class="drum-col"><div class="drum-col-label">'+dl+'</div>'+buildDrum('day',days,_drum.day-1)+'</div>'
      +'<div class="drum-divider"></div>'
      +'<div class="drum-col"><div class="drum-col-label">'+ml+'</div>'+buildDrum('month',months,_drum.month-1)+'</div>'
      +'<div class="drum-divider"></div>'
      +'<div class="drum-col"><div class="drum-col-label">'+yl+'</div>'+buildDrum('year',years,Math.max(0,years.indexOf(String(_drum.year))))+'</div>'
    +'</div>'
    +'<div style="display:flex;gap:10px;margin-top:16px">'
      +'<button class="btn btn-secondary" onclick="clearDrumDate(\''+field+'\')">'+clr+'</button>'
      +'<button class="btn btn-primary" onclick="confirmDrumDate()">'+t('save')+'</button>'
    +'</div>');
  setTimeout(()=>{initDrum('day',days,_drum.day-1);initDrum('month',months,_drum.month-1);initDrum('year',years,Math.max(0,years.indexOf(String(_drum.year))));},50);
}
function buildDrum(name,items,activeIdx){let h='<div class="drum-wrap" id="drum-'+name+'"><div class="drum-selector"></div><div class="drum-list" id="drumlist-'+name+'"><div class="drum-item"></div><div class="drum-item"></div>';items.forEach((it,i)=>{h+='<div class="drum-item'+(i===activeIdx?' active':'')+'" data-i="'+i+'">'+it+'</div>';});h+='<div class="drum-item"></div><div class="drum-item"></div></div></div>';return h;}
function initDrum(name,items,activeIdx){
  const list=document.getElementById('drumlist-'+name),wrap=document.getElementById('drum-'+name);if(!list||!wrap)return;
  const itemH=44;let curIdx=Math.max(0,Math.min(items.length-1,activeIdx));
  function scrollTo(idx,animate){curIdx=Math.max(0,Math.min(items.length-1,idx));list.style.transition=animate?'transform .22s cubic-bezier(.25,.46,.45,.94)':'none';list.style.transform='translateY('+(-curIdx*itemH)+'px)';list.querySelectorAll('.drum-item').forEach((el,i)=>{const rel=i-2-curIdx;el.classList.toggle('active',rel===0);el.classList.toggle('near',Math.abs(rel)===1);});if(name==='day')_drum.day=curIdx+1;else if(name==='month')_drum.month=curIdx+1;else _drum.year=parseInt(items[curIdx]);}
  scrollTo(curIdx,false);
  let ty=0,ti=0;
  wrap.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;ti=curIdx;list.style.transition='none';},{passive:true});
  wrap.addEventListener('touchmove',e=>{scrollTo(Math.round(ti+(ty-e.touches[0].clientY)/itemH),false);},{passive:true});
  wrap.addEventListener('touchend',()=>{list.style.transition='transform .15s ease';scrollTo(curIdx,true);},{passive:true});
  wrap.addEventListener('wheel',e=>{e.preventDefault();scrollTo(curIdx+(e.deltaY>0?1:-1),true);},{passive:false});
}
function confirmDrumDate(){
  const d=String(_drum.day).padStart(2,'0'),m=String(_drum.month).padStart(2,'0'),y=String(_drum.year);
  const val=y+'-'+m+'-'+d,disp=d+'.'+m+'.'+y,f=_drum.field;
  const MAP={nwStart:['nwStartVal','nwStartDisp','📅 '],nwEnd:['nwEndVal','nwEndDisp','🏁 '],ewStart:['ewStartVal','ewStartDisp','📅 '],ewEnd:['ewEndVal','ewEndDisp','🏁 ']};

  if(f==='ewStart'||f==='ewEnd')closeDrumOverlay();else closeModal();showToast(disp);
}
function clearDrumDate(field){

  const e=MAP[field];if(e){const h=document.getElementById(e[0]);if(h)h.value='';const dis=document.getElementById(e[1]);if(dis){dis.textContent=e[2];dis.classList.remove('has-value');}}

}

function exportPDF(){

  const now=new Date(),dateStr=now.toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});
  const fp=ts>0?Math.min(tf/ts*100,100):0,isOver=ts>tb&&tb>0;
  const stHTML=st.map(s=>{
    const sm=stageSmeta(s),fc=stageFact(s),sp=sm>0?Math.min(fc/sm*100,100):0;

    return`<div class="stage-block"><div class="stage-header" style="border-left:4px solid ${s.color}"><div><div class="stage-name">${s.icon} ${tName(s)}</div><div class="stage-sub">${positions.filter(p=>p.status==='done').length}/${positions.length} ${t('positions').toLowerCase()}</div></div><div class="stage-pct" style="color:${s.color}">${Math.round(sp)}%</div></div>
      <div class="stage-stats"><div class="stat-cell"><div class="stat-label">${t('smetaLabel')}</div><div class="stat-value gold">${fmt(sm)}</div></div><div class="stat-cell"><div class="stat-label">${t('factShort')}</div><div class="stat-value green">${fmt(fc)}</div></div><div class="stat-cell"><div class="stat-label">${t('remainder')}</div><div class="stat-value ${sm-fc<0?'red':'blue'}">${fmt(sm-fc)}</div></div></div>
      ${positions.map(p=>{const ps=posSmeta(p);return`<div class="pos-block"><div class="pos-header"><span class="pos-dot pos-dot-${p.status}">●</span><span class="pos-name">${p.name}</span><span class="pos-sum">${fmt(ps)}</span></div>
        ${(p.works||[]).length>0?`<table class="it"><thead><tr><th></th><th>${t('typeWork')}</th><th>${t('contractAmount')}</th><th>${t('paid')}</th></tr></thead><tbody>${(p.works||[]).map(w=>`<tr><td>👷</td><td>${w.name}${w.contractor?` (${w.contractor})`:''}</td><td style="text-align:right">${fmt(w.contractAmount||0)}</td><td style="text-align:right;color:#4a9b6a">${fmt(w.paid||0)}</td></tr>`).join('')}</tbody></table>`:''}
        ${(p.mats||[]).length>0?`<table class="it"><thead><tr><th></th><th>${t('typeMat')}</th><th>${t('qty')}</th><th>${t('price')}</th><th>Σ</th></tr></thead><tbody>${(p.mats||[]).map(m=>`<tr><td>🧱</td><td>${m.name}</td><td style="text-align:center">${m.qty||1} ${m.unit||'шт'}</td><td style="text-align:right">${fmt(m.price||0)}</td><td style="text-align:right">${fmt(matTotal(m))}</td></tr>`).join('')}</tbody></table>`:''}
      </div>`;}).join('')}
    </div>`;
  }).join('');
  const html=`<!DOCTYPE html><html lang="${lang}"><head><meta charset="UTF-8"/><link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Mulish',sans-serif;background:#fff;color:#1a1a2e;font-size:13px;line-height:1.5}@page{size:A4;margin:16mm 14mm}.doc-header{background:#0D0F14;color:#EAE6DE;padding:20px 24px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}.doc-title{font-size:22px;font-weight:700;color:#C9AA7C;margin-bottom:4px}.doc-sub{font-size:12px;color:#888}.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}.sb{border-radius:8px;padding:14px 16px;border:1px solid #e8e4dc}.sl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#999;margin-bottom:6px}.sv{font-family:'DM Mono',monospace;font-size:17px;font-weight:700}.gold{color:#b8924a}.green{color:#4a9b6a}.blue{color:#4a7fb8}.red{color:#b84a4a}.stage-block{border:1px solid #e8e4dc;border-radius:10px;margin-bottom:16px;overflow:hidden;break-inside:avoid}.stage-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f9f8f6}.stage-name{font-size:14px;font-weight:700;margin-bottom:2px}.stage-sub{font-size:11px;color:#999}.stage-pct{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}.stage-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8e4dc;border-top:1px solid #e8e4dc;border-bottom:1px solid #e8e4dc}.stat-cell{background:#fff;padding:10px 12px}.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#aaa;margin-bottom:4px}.stat-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}.pos-block{border-top:1px solid #f0ede8;padding:8px 16px}.pos-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}.pos-name{font-weight:600;flex:1}.pos-sum{font-family:'DM Mono',monospace;font-size:12px;color:#888}.pos-dot{font-size:8px}.pos-dot-done{color:#4a9b6a}.pos-dot-active{color:#b8924a}.pos-dot-idle{color:#ccc}.it{width:100%;border-collapse:collapse;margin-bottom:6px}.it thead tr{background:#f5f3ef}.it th{padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;border-bottom:1px solid #e8e4dc;text-align:left}.it td{padding:6px 8px;border-bottom:1px solid #f0ede8;font-size:12px}.doc-footer{margin-top:24px;padding-top:12px;border-top:1px solid #e8e4dc;display:flex;justify-content:space-between;font-size:10px;color:#bbb}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>
  <div class="doc-header"><div><div class="doc-title">${obj.icon} ${tName(obj)}</div><div class="doc-sub">${t('reportTitle')}</div></div><div style="font-size:11px;color:#666">${dateStr}</div></div>
  <div class="sg"><div class="sb" style="border-top:3px solid #C9AA7C"><div class="sl">${t('smeta')}</div><div class="sv gold">${fmt(ts)}</div></div><div class="sb" style="border-top:3px solid #80C89A"><div class="sl">${t('fact')}</div><div class="sv green">${fmt(tf)}</div><div style="font-size:11px;color:#aaa;margin-top:4px">${Math.round(fp)}%</div></div><div class="sb" style="border-top:3px solid #7BB8CC"><div class="sl">${t('remainder')}</div><div class="sv blue">${fmt(ts-tf)}</div></div></div>
  ${stHTML}
  <div class="doc-footer"><span>${obj.icon} ${tName(obj)}</span><span>${dateStr}</span></div>
  </body></html>`;
  const w=window.open('','_blank','width=900,height=700');w.document.write(html);w.document.close();w.onload=()=>{w.focus();w.print();};showToast(t('pdfOpening'));
}
// ── IMPORT ──
function triggerImport(){document.getElementById('importFile').click();}
function handleImport(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.objects&&data.activeObjectId){if(data.objects[0]?.stages?.[0]?.positions!==undefined||data.objects[0]?.stages?.length===0){db=data;}else{db=migrateV8toV9(data);}saveDB();renderDash();showToast(t('importSuccess'));}else{showToast(t('importError'),'err');}}catch{showToast(t('importError'),'err');}};reader.readAsText(file);e.target.value='';}
// ── PIN ──
const PIN_KEY='tikinti_pin',PIN_BIO='tikinti_bio';
let _pinMode=null,_pinEntered='',_pinTarget='';
const KEYPAD=[{n:'1',s:''},{n:'2',s:'ABC'},{n:'3',s:'DEF'},{n:'4',s:'GHI'},{n:'5',s:'JKL'},{n:'6',s:'MNO'},{n:'7',s:'PQRS'},{n:'8',s:'TUV'},{n:'9',s:'WXYZ'},null,{n:'0',s:'+'},'del'];
function pinLabel(mode){if(mode==='enter')return lang==='en'?'Enter PIN':lang==='az'?'PIN daxil edin':'Введите PIN';if(mode==='set')return lang==='en'?'Set new PIN':lang==='az'?'Yeni PIN':'Задайте PIN';return lang==='en'?'Confirm PIN':lang==='az'?'Təsdiq':'Подтвердите PIN';}
async function checkBiometric(){if(!window.PublicKeyCredential)return false;try{return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}catch{return false;}}
function showPinOverlay(mode,onSuccess){
  _pinMode=mode;_pinEntered='';_pinTarget='';
  const hasBio=localStorage.getItem(PIN_BIO)==='1',bioAvail='PublicKeyCredential' in window;
  const overlay=document.createElement('div');overlay.className='pin-overlay';overlay.id='pinOverlay';
  overlay.innerHTML=`<div class="pin-logo">🏡 Tikinti</div><div class="pin-subtitle">${pinLabel(mode)}</div><div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd${i}"></div>`).join('')}</div><div class="pin-pad">${KEYPAD.map(k=>{if(!k)return'<button class="pin-key empty"></button>';if(k==='del')return`<button class="pin-key del" onclick="pinDel()">⌫</button>`;return`<button class="pin-key" onclick="pinKey('${k.n}')"><span>${k.n}</span>${k.s?`<span class="pin-key-sub">${k.s}</span>`:''}</button>`;}).join('')}</div>${mode==='enter'&&hasBio&&bioAvail?`<button class="pin-bio" onclick="biometricAuth()">🫆</button>`:''} ${mode==='enter'?`<button style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Mulish',sans-serif;margin-top:4px" onclick="document.getElementById('pinOverlay').remove()">${t('cancel')}</button>`:''}`;
  overlay._onSuccess=onSuccess;document.body.appendChild(overlay);
  if(mode==='enter'&&hasBio&&bioAvail)setTimeout(()=>biometricAuth(),400);
}
async function biometricAuth(){if(!('credentials' in navigator))return;try{const c=await navigator.credentials.get({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),rpId:location.hostname,userVerification:'required',allowCredentials:[],timeout:30000}});if(c){const ov=document.getElementById('pinOverlay'),cb=ov?._onSuccess;ov?.remove();if(cb)cb();showToast('✓');}}catch(e){console.log('Bio:',e.name);}}
function pinKey(n){if(_pinEntered.length>=4)return;_pinEntered+=n;updatePinDots();if(_pinEntered.length===4)setTimeout(processPinInput,150);}
function pinDel(){if(!_pinEntered.length)return;_pinEntered=_pinEntered.slice(0,-1);updatePinDots();}
function updatePinDots(error){for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(!d)continue;d.classList.toggle('filled',!error&&i<_pinEntered.length);d.classList.toggle('error',!!error);}}
function processPinInput(){
  const stored=localStorage.getItem(PIN_KEY);
  if(_pinMode==='enter'){if(_pinEntered===stored){const ov=document.getElementById('pinOverlay'),cb=ov?._onSuccess;ov?.remove();if(cb)cb();}else{updatePinDots(true);setTimeout(()=>{_pinEntered='';updatePinDots();},600);if(navigator.vibrate)navigator.vibrate([50,30,50]);showToast(lang==='en'?'Wrong PIN':'Неверный PIN','err');}}
  else if(_pinMode==='set'){_pinTarget=_pinEntered;_pinEntered='';updatePinDots();const sub=document.querySelector('.pin-subtitle');if(sub)sub.textContent=pinLabel('confirm');_pinMode='confirm';}
  else if(_pinMode==='confirm'){if(_pinEntered===_pinTarget){localStorage.setItem(PIN_KEY,_pinEntered);document.getElementById('pinOverlay')?.remove();askBiometric();showToast('PIN ✓');}else{updatePinDots(true);setTimeout(()=>{_pinEntered='';_pinTarget='';_pinMode='set';updatePinDots();const sub=document.querySelector('.pin-subtitle');if(sub)sub.textContent=pinLabel('set');},600);showToast(lang==='en'?"PINs don't match":'PIN не совпадает','err');}}
}
async function askBiometric(){const avail=await checkBiometric();if(!avail)return;showModal(`<div class="modal-handle"></div><div class="modal-title" style="font-size:14px">${lang==='en'?'Enable fingerprint?':'Включить отпечаток?'}</div><div style="font-size:32px;text-align:center;margin:10px 0">🫆</div><div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="localStorage.setItem('${PIN_BIO}','1');closeModal();showToast('✓')">${lang==='en'?'Enable':'Включить'}</button></div>`);}
function checkPin(){const pin=localStorage.getItem(PIN_KEY);if(!pin)return;document.getElementById('pageDash').style.visibility='hidden';showPinOverlay('enter',()=>{document.getElementById('pageDash').style.visibility='';});}
function pinSettings(){const hasPin=!!localStorage.getItem(PIN_KEY),hasBio=localStorage.getItem(PIN_BIO)==='1';let h='<div class="modal-handle"></div><div class="modal-title">🔐 PIN</div><div style="display:flex;flex-direction:column;gap:10px">';h+=`<button class="btn btn-secondary" onclick="closeModal();showPinOverlay('set')">${hasPin?(lang==='en'?'Change PIN':'Изменить PIN'):(lang==='en'?'Set PIN':'Задать PIN')}</button>`;if(hasPin){h+=`<button class="btn btn-secondary" onclick="closeModal();confirmRemovePin()">${lang==='en'?'Remove PIN':'Удалить PIN'}</button>`;h+=`<button class="btn btn-secondary" onclick="toggleBio()">${hasBio?(lang==='en'?'Disable fingerprint':'Отключить отпечаток'):(lang==='en'?'Enable fingerprint':'Включить отпечаток')}</button>`;}h+='</div>';showModal(h);}
function toggleBio(){const h=localStorage.getItem(PIN_BIO)==='1';localStorage.setItem(PIN_BIO,h?'0':'1');closeModal();showToast('✓');}
function confirmRemovePin(){showModal(`<div class="modal-handle"></div><div class="modal-title">${lang==='en'?'Remove PIN?':'Удалить PIN?'}</div><div style="display:flex;gap:10px;margin-top:4px"><button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-danger" style="flex:1" onclick="localStorage.removeItem('${PIN_KEY}');localStorage.removeItem('${PIN_BIO}');closeModal();showToast(lang==='en'?'PIN removed':'PIN удалён')">${t('delete')}</button></div>`);}
// ── PWA / SWIPE ──
window._installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();window._installPrompt=e;renderDash();});
function installApp(){if(!window._installPrompt)return;window._installPrompt.prompt();window._installPrompt.userChoice.then(()=>{window._installPrompt=null;renderDash();});}
let dTxS=0,dTyS=0,dSwD=null,dSwing=false;
const dashPage=document.getElementById('pageDash');
dashPage.addEventListener('touchstart',e=>{if(drawerEl.classList.contains('open'))return;dTxS=e.touches[0].clientX;dTyS=e.touches[0].clientY;dSwD=null;dSwing=false;},{passive:true});
dashPage.addEventListener('touchmove',e=>{if(drawerEl.classList.contains('open'))return;const dx=e.touches[0].clientX-dTxS,dy=e.touches[0].clientY-dTyS;if(!dSwD)dSwD=Math.abs(dx)>Math.abs(dy)?'h':'v';if(dSwD==='h'&&dx>0){dSwing=true;const off=Math.min(dx,285);drawerEl.style.transition='none';drawerEl.style.transform=`translateX(calc(-100% + ${off}px))`;backdropEl.style.transition='none';backdropEl.style.background=`rgba(0,0,0,${Math.min(off/285*0.6,.6)})`;backdropEl.style.pointerEvents='all';}},{passive:true});
dashPage.addEventListener('touchend',e=>{if(!dSwing)return;const dx=e.changedTouches[0].clientX-dTxS;drawerEl.style.transition='';backdropEl.style.transition='';if(dx>80){drawerEl.style.transform='';drawerEl.classList.add('open');backdropEl.style.background='';backdropEl.classList.add('open');backdropEl.style.pointerEvents='';renderDrawer();updateDrawerLabels();}else{drawerEl.style.transform='';backdropEl.style.background='';backdropEl.style.pointerEvents='';}dSwing=false;},{passive:true});
// ── INIT ──
document.getElementById('btnAdd').onclick=()=>showStageModal(null);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
updateDrawerLabels();renderDash();checkPin();
const urlParams=new URLSearchParams(window.location.search);
const action=urlParams.get('action');
if(action==='addStage')setTimeout(()=>showStageModal(null),400);
if(action==='addObject')setTimeout(()=>addObjectPrompt(),400);
</script>
